# NODE DATA MARINGÁ — Docker Compose PRODUÇÃO
# Para usar no Coolify: aponte para este arquivo
# ============================================================

version: '3.8'

services:

  # ── Redis ────────────────────────────────────────────────
  # Banco de mensagens em memória (fila de webhooks do WhatsApp)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    # ⚠️ Sem "ports" aqui — Redis só é acessível internamente pelos outros containers
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ───────────────────────────────────────────────
  # API FastAPI — sem --reload e sem hot-reload em produção
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=production
      - DEBUG=false
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    # ⚠️ Sem "ports" — o backend só é acessível pelo nginx do frontend (via nome "backend")
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Workers ───────────────────────────────────────────────
  # Processam a fila de mensagens do WhatsApp em paralelo
  worker:
    build: ./backend
    # ⚠️ "always" (e não "unless-stopped"): garante que o worker volte mesmo
    # após um Stop manual ou reboot da VPS. Sem isso, o consumidor da fila
    # pode ficar fora do ar silenciosamente (mensagens chegam mas ninguém responde).
    restart: always
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=production
      - DEBUG=false
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: python worker.py
    # Healthcheck: lê o heartbeat que o worker grava no Redis a cada ciclo.
    # Sem heartbeat válido (worker travado/morto) → container fica "unhealthy"
    # e aparece como problema no Coolify, em vez de sumir silenciosamente.
    healthcheck:
      test: ["CMD", "python", "-c", "import os,redis,sys; sys.exit(0 if redis.Redis.from_url(os.environ['REDIS_URL']).get('worker:heartbeat') else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # ── Frontend ──────────────────────────────────────────────
  # React buildado + Nginx servindo os arquivos e fazendo proxy para o backend
  frontend:
    build: ./frontend
    restart: unless-stopped
    env_file: ./frontend/.env
    # ⚠️ Sem "ports" — o Coolify/Traefik roteia o tráfego via labels (configurado no domínio :80)
    depends_on:
      backend:
        condition: service_healthy

volumes:
  redis_data:
