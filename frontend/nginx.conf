server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Segurança — cabeçalhos que protegem o painel
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy — repassa chamadas /api/* para o backend FastAPI
    # Assim o frontend e o backend compartilham o mesmo domínio
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Proxy — repassa webhooks do WhatsApp para o backend
    location /webhook/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Health check do backend acessível externamente
    location /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # SPA — envia todas as rotas para o index.html (necessário para o React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de longa duração para arquivos estáticos (JS, CSS, imagens)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
