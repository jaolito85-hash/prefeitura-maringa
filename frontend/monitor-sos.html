<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Monitor SOS — Node Mulher Segura</title>
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0e17;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#131926;border-bottom:1px solid #1e2a3a;flex-shrink:0;z-index:10}
.topbar h1{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.live{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#e03e6b;text-transform:uppercase;letter-spacing:1px;padding:4px 12px;background:rgba(224,62,107,.1);border:1px solid rgba(224,62,107,.3);border-radius:20px}
.live .dot{width:7px;height:7px;border-radius:50%;background:#e03e6b;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.main{display:flex;flex:1;overflow:hidden}
#map{flex:1}
.sidebar{width:320px;flex-shrink:0;background:#131926;border-left:1px solid #1e2a3a;display:flex;flex-direction:column;overflow:hidden}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px}
.stat{background:#0a0e17;border:1px solid #1e2a3a;border-radius:10px;padding:12px;text-align:center}
.stat-val{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
.stat-lbl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.trail-header{padding:10px 14px;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1px;border-top:1px solid #1e2a3a;border-bottom:1px solid #1e2a3a;display:flex;justify-content:space-between;align-items:center}
.trail-count{background:rgba(224,62,107,.12);color:#e03e6b;padding:2px 8px;border-radius:10px;font-size:11px}
.trail-list{flex:1;overflow-y:auto;padding:8px}
.trail-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;margin-bottom:4px;font-size:12px;background:rgba(255,255,255,.02);border:1px solid #1e2a3a}
.trail-item:first-child{background:rgba(224,62,107,.06);border-color:rgba(224,62,107,.2)}
.trail-num{width:24px;height:24px;border-radius:50%;background:rgba(224,62,107,.12);color:#e03e6b;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;flex-shrink:0}
.trail-coords{font-family:monospace;font-size:11px;color:#94a3b8}
.trail-meta{margin-left:auto;text-align:right;font-size:10px;color:#64748b;flex-shrink:0}
.mapboxgl-ctrl-bottom-left,.mapboxgl-ctrl-bottom-right{display:none!important}
.info-box{position:absolute;top:16px;left:16px;z-index:5;background:rgba(19,25,38,.92);backdrop-filter:blur(12px);border:1px solid #1e2a3a;border-radius:12px;padding:14px 18px;font-size:12px;color:#94a3b8;max-width:240px;line-height:1.6}
.info-box strong{color:#e2e8f0}
.info-box .nome{color:#e03e6b;font-weight:700;font-size:14px}
</style></head><body>
<div class="topbar">
<h1>🛡️ Monitor SOS — Node Mulher Segura</h1>
<div class="live"><span class="dot"></span>Rastreamento ao vivo</div>
</div>
<div class="main">
<div id="map" style="position:relative">
<div class="info-box" id="infoBox">Carregando sessão...</div>
</div>
<div class="sidebar">
<div class="stats">
<div class="stat"><div class="stat-val" id="sPontos" style="color:#e03e6b">0</div><div class="stat-lbl">Pontos GPS</div></div>
<div class="stat"><div class="stat-val" id="sPrecisao" style="color:#3b82f6">—</div><div class="stat-lbl">Precisão (m)</div></div>
<div class="stat"><div class="stat-val" id="sDist" style="color:#22c55e">0</div><div class="stat-lbl">Distância (m)</div></div>
<div class="stat"><div class="stat-val" id="sTempo" style="color:#fbbf24">00:00</div><div class="stat-lbl">Tempo ativo</div></div>
</div>
<div class="trail-header">Trilha de pontos <span class="trail-count" id="tCount">0</span></div>
<div class="trail-list" id="trailList"></div>
</div>
</div>
<script>
var SUPABASE_URL="https://kuhtndyhuddjpqimuijn.supabase.co";
var SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1aHRuZHlodWRkanBxaW11aWpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Mzg1MDgsImV4cCI6MjA4OTUxNDUwOH0.q5bLnE2D2zhDND_8NAkuZE4Rul0pGp8vnUStISBBLwM";
var MAPBOX_TOKEN='pk.eyJ1Ijoibm9kZWRhdGEiLCJhIjoiY21tejgxMm1hMDVxajJ3cTU2Z3ZrNTBiZSJ9.t6vT60mOCmGpYrHfRSykrw';

var pontos=[];
var sessaoId=null;
var map=null;
var startTime=null;
var timerInterval=null;

// Pega token da URL
var params=new URLSearchParams(window.location.search);
var token=params.get("t")||"teste123";

// Headers Supabase
var headers={"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json"};

// Inicializa mapa
mapboxgl.accessToken=MAPBOX_TOKEN;
map=new mapboxgl.Map({container:'map',style:'mapbox://styles/mapbox/dark-v11',center:[-51.9375,-23.4205],zoom:14,pitch:30});
map.addControl(new mapboxgl.NavigationControl(),'top-right');

map.on('load',function(){
  // Fonte dos pontos
  map.addSource('trail',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  // Linha da trilha
  map.addSource('trail-line',{type:'geojson',data:{type:'Feature',geometry:{type:'LineString',coordinates:[]}}});

  map.addLayer({id:'trail-line-shadow',type:'line',source:'trail-line',paint:{'line-color':'#000','line-width':6,'line-opacity':0.3,'line-blur':4}});
  map.addLayer({id:'trail-line-main',type:'line',source:'trail-line',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':'#e03e6b','line-width':3,'line-opacity':0.8}});
  map.addLayer({id:'trail-line-glow',type:'line',source:'trail-line',paint:{'line-color':'#e03e6b','line-width':10,'line-opacity':0.12,'line-blur':6}});

  // Pontos
  map.addLayer({id:'trail-dots',type:'circle',source:'trail',paint:{'circle-radius':5,'circle-color':'#e03e6b','circle-opacity':0.7,'circle-stroke-width':2,'circle-stroke-color':'rgba(255,255,255,0.5)'}});

  // Ponto mais recente (maior)
  map.addSource('latest',{type:'geojson',data:{type:'Feature',geometry:{type:'Point',coordinates:[0,0]}}});
  map.addLayer({id:'latest-pulse',type:'circle',source:'latest',paint:{'circle-radius':18,'circle-color':'#e03e6b','circle-opacity':0.15}});
  map.addLayer({id:'latest-dot',type:'circle',source:'latest',paint:{'circle-radius':8,'circle-color':'#e03e6b','circle-opacity':0.95,'circle-stroke-width':3,'circle-stroke-color':'#fff'}});

  // Carrega sessão e pontos
  carregarSessao();
});

async function carregarSessao(){
  try{
    var r=await fetch(SUPABASE_URL+"/rest/v1/emergencia_sessoes?token=eq."+token+"&select=id,nome,telefone",{headers:headers});
    var data=await r.json();
    if(data.length===0){document.getElementById('infoBox').innerHTML='<span style="color:#ef4444">Sessão não encontrada</span>';return;}
    sessaoId=data[0].id;
    var nome=data[0].nome||'Não identificada';
    var tel=data[0].telefone||'—';
    document.getElementById('infoBox').innerHTML='<div class="nome">'+nome+'</div><div style="margin-top:4px">📱 '+tel+'</div><div style="margin-top:4px">🔑 Token: '+token+'</div>';
    carregarPontos();
    iniciarRealtime();
    startTime=Date.now();
    timerInterval=setInterval(updateTimer,1000);
  }catch(e){document.getElementById('infoBox').innerHTML='Erro: '+e.message;}
}

async function carregarPontos(){
  try{
    var r=await fetch(SUPABASE_URL+"/rest/v1/emergencia_pontos?sessao_id=eq."+sessaoId+"&order=created_at.asc&select=*",{headers:headers});
    var data=await r.json();
    pontos=data;
    atualizarMapa();
    atualizarStats();
    atualizarTrail();
    if(pontos.length>0){
      var last=pontos[pontos.length-1];
      map.flyTo({center:[last.longitude,last.latitude],zoom:16,duration:1500});
    }
  }catch(e){console.error(e);}
}

function iniciarRealtime(){
  // Polling a cada 3 segundos (mais confiável que websocket pra esse caso)
  setInterval(async function(){
    try{
      var r=await fetch(SUPABASE_URL+"/rest/v1/emergencia_pontos?sessao_id=eq."+sessaoId+"&order=created_at.asc&select=*",{headers:headers});
      var data=await r.json();
      if(data.length>pontos.length){
        pontos=data;
        atualizarMapa();
        atualizarStats();
        atualizarTrail();
        var last=pontos[pontos.length-1];
        map.easeTo({center:[last.longitude,last.latitude],duration:800});
      }
    }catch(e){}
  },3000);
}

var _routeCache={};
var _routeQueue=[];
var _routeProcessing=false;

async function _fetchRoute(lonA,latA,lonB,latB){
  var key=lonA.toFixed(5)+','+latA.toFixed(5)+'>'+lonB.toFixed(5)+','+latB.toFixed(5);
  if(_routeCache[key]) return _routeCache[key];
  try{
    var url='https://api.mapbox.com/directions/v5/mapbox/driving/'+lonA+','+latA+';'+lonB+','+latB+'?geometries=geojson&overview=full&access_token='+MAPBOX_TOKEN;
    var r=await fetch(url);
    if(!r.ok) return null;
    var data=await r.json();
    if(data.routes&&data.routes[0]){
      var coords=data.routes[0].geometry.coordinates;
      _routeCache[key]=coords;
      return coords;
    }
  }catch(e){}
  return null;
}

async function _buildSmartLine(pontosList){
  // Constrói linha que segue ruas quando distância entre pontos > 200m
  var THRESHOLD=200; // metros
  var allCoords=[];
  for(var i=0;i<pontosList.length;i++){
    var cur=[pontosList[i].longitude,pontosList[i].latitude];
    if(i===0){allCoords.push(cur);continue;}
    var prev=[pontosList[i-1].longitude,pontosList[i-1].latitude];
    var dist=haversine(prev[1],prev[0],cur[1],cur[0]);
    if(dist>THRESHOLD){
      // Distância grande → buscar rota pelas ruas
      var route=await _fetchRoute(prev[0],prev[1],cur[0],cur[1]);
      if(route&&route.length>1){
        // Adicionar pontos da rota (exceto o primeiro que já está)
        for(var j=1;j<route.length;j++) allCoords.push(route[j]);
      }else{
        allCoords.push(cur);
      }
    }else{
      allCoords.push(cur);
    }
  }
  return allCoords;
}

function atualizarMapa(){
  if(!pontos.length)return;
  // Pontos (sempre atualiza imediatamente)
  var features=pontos.map(function(p,i){return{type:'Feature',geometry:{type:'Point',coordinates:[p.longitude,p.latitude]},properties:{n:i+1}};});
  map.getSource('trail').setData({type:'FeatureCollection',features:features});
  // Ponto mais recente
  var last=pontos[pontos.length-1];
  map.getSource('latest').setData({type:'Feature',geometry:{type:'Point',coordinates:[last.longitude,last.latitude]}});
  // Linha inteligente (async — segue ruas quando há saltos)
  _buildSmartLine(pontos).then(function(coords){
    if(coords&&coords.length>1){
      map.getSource('trail-line').setData({type:'Feature',geometry:{type:'LineString',coordinates:coords}});
    }
  });
}

function atualizarStats(){
  document.getElementById('sPontos').textContent=pontos.length;
  if(pontos.length>0){
    var last=pontos[pontos.length-1];
    document.getElementById('sPrecisao').textContent=last.precisao_metros||'—';
  }
  // Distância total
  var dist=0;
  for(var i=1;i<pontos.length;i++){dist+=haversine(pontos[i-1].latitude,pontos[i-1].longitude,pontos[i].latitude,pontos[i].longitude);}
  document.getElementById('sDist').textContent=Math.round(dist);
}

function atualizarTrail(){
  var list=document.getElementById('trailList');
  document.getElementById('tCount').textContent=pontos.length;
  list.innerHTML='';
  // Mais recente primeiro
  for(var i=pontos.length-1;i>=0;i--){
    var p=pontos[i];
    var hora=new Date(p.created_at).toLocaleTimeString('pt-BR');
    var el=document.createElement('div');
    el.className='trail-item';
    el.innerHTML='<div class="trail-num">'+(i+1)+'</div><div class="trail-coords">'+p.latitude.toFixed(6)+', '+p.longitude.toFixed(6)+'</div><div class="trail-meta">'+(p.precisao_metros||'—')+'m<br>'+hora+'</div>';
    list.appendChild(el);
  }
}

function haversine(lat1,lon1,lat2,lon2){var R=6371000;var d1=(lat2-lat1)*Math.PI/180;var d2=(lon2-lon1)*Math.PI/180;var a=Math.sin(d1/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(d2/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

function updateTimer(){
  if(!startTime)return;
  var s=Math.floor((Date.now()-startTime)/1000);
  document.getElementById('sTempo').textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}
</script>
</body></html>
