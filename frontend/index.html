/* Map API categories to icon types */
const OC_TYPE_MAP={
  buraco_via:'acidente',conservacao_de_vias:'acidente',
  iluminacao_publica:'gas',
  arborizacao:'arvore',queda_arvore:'arvore',arvore_caida:'arvore',
  incendio:'incendio',
  drenagem:'alagamento',enchente_alagamento:'alagamento',alagamento:'alagamento',
  animal_solto:'animal',animal:'animal',
  vendaval:'gas',acidente:'acidente',
  outros_urbanos:'gas',geral:'gas',
};
/* Map API status to step index */
const OC_STATUS_STEP={aberto:0,encaminhada:1,equipe_caminho:1,no_local:2,em_atendimento:2,resolvido:3};
const OC_STATUS_LABELS=['Aberto','Encaminhada','No Local','Resolvido'];
const OC_STATUS_CLS=['aberto','encaminhada','no-local','resolvido'];

/* Phone masking: +55 44 9xxxxx66 */
function ocMaskPhone(phone){
  if(!phone)return'+55 44 9xxxxx00';
  const digits=phone.replace(/\D/g,'');
  if(digits.length>=12){
    const cc=digits.slice(0,2);const ddd=digits.slice(2,4);const first=digits[4];const last2=digits.slice(-2);
    return`+${cc} ${ddd} ${first}xxxxx${last2}`;
  }
  return phone;
}

/* (Mock citizen data removed — now fetched from API) */

function Ocorrencias(){
  const [sel,setSel]=useState(null);
  const [viewCitizen,setViewCitizen]=useState(null);
  const [handoffMap,setHandoffMap]=useState({});
  const [sevFilter,setSevFilter]=useState('todas');
  const [typeFilter,setTypeFilter]=useState('todos');
  const [lbOpen,setLbOpen]=useState(false);
  const [lbPhotos,setLbPhotos]=useState([]);
  const [lbTotal,setLbTotal]=useState(0);
  const [lbCurrent,setLbCurrent]=useState(0);
  const [humanMsg,setHumanMsg]=useState('');
  const [routeData,setRouteData]=useState(null);
  const [routeBase,setRouteBase]=useState(null);
  const [routeIncident,setRouteIncident]=useState(null);
  const [loadingRoute,setLoadingRoute]=useState(false);
  const [relatosPorOc,setRelatosPorOc]=useState({});
  const chatBodyRef=useRef(null);

  /* Fetch relatos when selecting an occurrence */
  useEffect(()=>{
    if(!sel)return;
    if(relatosPorOc[sel.id])return;
    fetch(API_URL+'/api/ocorrencias/'+sel.id+'/relatos')
      .then(r=>r.ok?r.json():[])
      .then(data=>{setRelatosPorOc(prev=>({...prev,[sel.id]:data||[]}));})
      .catch(()=>{});
  },[sel?.id]);

  async function handleTraceRoute(item){
    setLoadingRoute(true);
    let destLat=item.lat, destLng=item.lng;
    /* Se não tem coordenadas, geocodifica o endereço via Mapbox */
    if(!destLat||!destLng){
      const endereco=item.endereco||item.endereco_normalizado||item.bairro;
      if(!endereco){alert('Sem endereço ou coordenadas para traçar rota.');setLoadingRoute(false);return;}
      try{
        const geoRes=await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(endereco+', Maringá, Paraná, Brasil')}.json?access_token=${MAPBOX_TOKEN}&limit=1`);
        const geoData=await geoRes.json();
        if(geoData.features&&geoData.features.length>0){
          const [gLng,gLat]=geoData.features[0].center;
          destLat=gLat; destLng=gLng;
        }else{alert('Não foi possível localizar o endereço no mapa.');setLoadingRoute(false);return;}
      }catch(e){alert('Erro ao geocodificar endereço: '+e.message);setLoadingRoute(false);return;}
    }
    const base=nearestBase(destLat,destLng,'gcm');
    if(!base){setLoadingRoute(false);return;}
    const r=await fetchRoute(base.lng,base.lat,destLng,destLat);
    if(r){setRouteData(r);setRouteBase(base);setRouteIncident({...item,lat:destLat,lng:destLng});}
    setLoadingRoute(false);
  }

  /* Filtered list */
  const lista=OC.filter(o=>{
    if(sevFilter!=='todas'&&o.severidade!==sevFilter)return false;
    if(typeFilter!=='todos'){
      const t=OC_TYPE_MAP[o.categoria]||'gas';
      if(t!==typeFilter)return false;
    }
    return o.status!=='resolvido';
  });

  /* Status update helper */
  async function updateStatus(ocId,newStatus){
    try{
      const res=await fetch(API_URL+'/api/ocorrencias/'+ocId+'/status',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:newStatus})});
      if(res.ok){
        if(sel&&sel.id===ocId)setSel(prev=>({...prev,status:newStatus}));
      } else {
        const err=await res.json().catch(()=>({}));alert('Erro: '+(err.detail||res.statusText));
      }
    }catch(e){alert('Erro: '+e.message);}
  }

  /* Status flow click — only "No Local" is clickable by operator */
  function handleStatusClick(stepIdx){
    if(!sel)return;
    const currentStep=OC_STATUS_STEP[sel.status]||0;
    if(stepIdx<=currentStep)return;
    /* Only step 2 (No Local) is clickable manually */
    if(stepIdx===2){
      updateStatus(sel.id,'no_local');
    }
    /* Steps 0 (Aberto), 1 (Encaminhada) and 3 (Resolvido) are controlled by buttons */
  }

  /* Despachar: requires team selection */
  async function handleDespachar(){
    if(!sel)return;
    const selectEl=document.querySelector('.oc-team-select');
    const equipe=selectEl?.value;
    if(!equipe||equipe==='Designar equipe...'){
      alert('Selecione uma equipe antes de despachar.');
      return;
    }
    try{
      const res=await fetch(API_URL+'/api/ocorrencias/'+sel.id+'/status',{
        method:'PATCH',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({status:'encaminhada',equipe_designada:equipe})
      });
      if(res.ok){
        const updated=await res.json();
        setSel(prev=>({...prev,status:'encaminhada',equipe_designada:equipe,...updated}));
      }else{
        const err=await res.json().catch(()=>({}));alert('Erro: '+(err.detail||res.statusText));
      }
    }catch(e){alert('Erro: '+e.message);}
  }

  /* Handoff toggle */
  async function toggleHandoff(citizenPhone){
    const ativo=!handoffMap[citizenPhone];
    if(ativo){
      setHandoffMap(prev=>({...prev,[citizenPhone]:true}));
    } else {
      setHandoffMap(prev=>{const copy={...prev};delete copy[citizenPhone];return copy;});
    }
    try{
      await fetch(API_URL+'/api/ocorrencias/'+sel.id+'/handoff',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({telefone:citizenPhone,ativo,operador:'admin'})
      });
    }catch(e){console.error('Handoff error:',e);}
  }

  /* Send human message */
  async function sendHuman(){
    if(!humanMsg.trim()||!viewCitizen||!sel)return;
    try{
      await fetch(API_URL+'/api/ocorrencias/'+sel.id+'/send-message',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({telefone:viewCitizen,mensagem:humanMsg.trim(),operador:'Atendente'})
      });
      const data=await fetch(API_URL+'/api/ocorrencias/'+sel.id+'/relatos').then(r=>r.json());
      setRelatosPorOc(prev=>({...prev,[sel.id]:data}));
      setHumanMsg('');
    }catch(e){console.error('Send error:',e);}
  }

  /* Lightbox keyboard */
  useEffect(()=>{
    function handleKey(e){
      if(!lbOpen)return;
      if(e.key==='Escape')setLbOpen(false);
      if(e.key==='ArrowRight')setLbCurrent(c=>(c+1)%lbTotal);
      if(e.key==='ArrowLeft')setLbCurrent(c=>(c-1+lbTotal)%lbTotal);
    }
    window.addEventListener('keydown',handleKey);
    return()=>window.removeEventListener('keydown',handleKey);
  },[lbOpen,lbTotal]);

  /* Scroll chat to bottom */
  useEffect(()=>{
    if(chatBodyRef.current)chatBodyRef.current.scrollTop=chatBodyRef.current.scrollHeight;
  },[viewCitizen,handoffMap,relatosPorOc]);

  /* Close panel on Escape */
  useEffect(()=>{
    function esc(e){if(e.key==='Escape'&&!lbOpen){if(viewCitizen){setViewCitizen(null);}else if(sel){setSel(null);}}}
    window.addEventListener('keydown',esc);
    return()=>window.removeEventListener('keydown',esc);
  },[sel,viewCitizen,lbOpen]);

  const panelOpen=!!sel;

  const currentCitizens=useMemo(()=>{
    if(!sel)return[];
    const relatos=relatosPorOc[sel.id]||[];
    const byPhone={};
    relatos.forEach(r=>{
      if(r.telefone==='operador')return;
      if(!byPhone[r.telefone]){
        byPhone[r.telefone]={
          id:r.telefone,
          name:r.nome||'Cidadão',
          phone:r.telefone||'',
          initials:(r.nome||'C').split(' ').map(w=>w?.[0]||'').join('').slice(0,2).toUpperCase(),
          msgs:0,
          time:'',
          relatos:[],
        };
      }
      byPhone[r.telefone].msgs++;
      byPhone[r.telefone].time=new Date(r.created_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      byPhone[r.telefone].relatos.push(r);
    });
    return Object.values(byPhone);
  },[sel?.id,relatosPorOc]);

  const activeCitizen=viewCitizen?currentCitizens.find(c=>c.id===viewCitizen):null;

  const allRelatosForChat=useMemo(()=>{
    if(!sel||!viewCitizen)return[];
    const relatos=relatosPorOc[sel.id]||[];
    return relatos
      .filter(r=>r.telefone===viewCitizen||r.telefone==='operador')
      .sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  },[sel?.id,viewCitizen,relatosPorOc]);

  const currentStep=sel?(OC_STATUS_STEP[sel.status]||0):0;
  const hasAnyHandoff=sel&&currentCitizens.some(c=>handoffMap[c.id]);

  /* Render card icon */
  function CardIcon({type}){
    const Svg=OC_SVG[type]||OC_SVG.gas;
    return <div className={`oc-icon ${type}`}><Svg/></div>;
  }

  return(
    <div className="oc-layout">
      {/* LEFT SIDEBAR */}
      <div className="oc-sidebar">
        <div className="oc-sidebar-header">
          <div className="oc-sidebar-title">
            <h2>Ocorrências</h2>
            <span className="oc-count">{lista.length} ativas</span>
          </div>
          <div className="oc-filters">
            <div className="oc-filter-row">
              {['todas','critica','alta','media','baixa'].map(s=>(
                <button key={s} className={`oc-fbtn ${sevFilter===s?'active':''}`}
                  onClick={()=>setSevFilter(s)}>
                  {s==='todas'?'Todas':s==='critica'?'Crítica':s==='alta'?'Alta':s==='media'?'Média':'Baixa'}
                </button>
              ))}
            </div>
            <div className="oc-filter-row">
              {[{k:'todos',l:'Todos tipos'},{k:'arvore',l:'Árvore'},{k:'incendio',l:'Incêndio'},{k:'acidente',l:'Acidente'},{k:'animal',l:'Animal'}].map(t=>(
                <button key={t.k} className={`oc-fbtn ${typeFilter===t.k?'active':''}`}
                  onClick={()=>setTypeFilter(t.k)}>
                  {t.l}
                </button>
              ))}
            </div>
          </div>
        </div>
        <div className="oc-cards-list">
          {lista.filter(o=>o&&o.id).map(o=>{
            const type=OC_TYPE_MAP[o?.categoria]||'gas';
            const sev=o?.severidade||'baixa';
            const step=OC_STATUS_STEP[o.status]||0;
            const isSel=sel?.id===o.id;
            const realUrls=(o?.midia_urls||[]).filter(Boolean);
            const totalMedia=realUrls.length;
            const cardRelatos=relatosPorOc[o.id]||[];
            const cardPhones=[...new Set(cardRelatos.filter(r=>r.telefone!=='operador').map(r=>r.telefone))];
            const cardHandoff=cardPhones.some(p=>handoffMap[p]);
            return(
              <div key={o.id} className={`oc-card ${isSel?'selected':''}`} onClick={()=>{setSel(o);setViewCitizen(null);}}>
                <div className="oc-card-top">
                  <CardIcon type={type}/>
                  <div className="oc-card-info">
                    <div className="oc-card-title">{o?.titulo||o?.title||'Ocorrência'}</div>
                    <div className="oc-card-meta">{o?.bairro||'—'} · {ago(o?.created_at)}</div>
                  </div>
                  <span className={`oc-sev ${sev}`}>{sev==='critica'?'Crítica':sev==='alta'?'Alta':sev==='media'?'Média':'Baixa'}</span>
                </div>
                <div className="oc-card-bottom">
                  <span className={`oc-status-text ${OC_STATUS_CLS[step]}`}>{OC_STATUS_LABELS[step]}</span>
                  <div className="oc-right-info">
                    <span className="oc-reporters"><OC_SVG.people width={14} height={14}/> {o.total_relatos||0}</span>
                    {totalMedia>0&&<span className="oc-attach"><OC_SVG.attach width={13} height={13}/> {totalMedia}</span>}
                  </div>
                </div>
                <div className="oc-progress-mini">
                  {[0,1,2,3].map(i=><div key={i} className={`oc-p-step ${i<step?'done':i===step?'current':''}`}/>)}
                </div>
                <div className={`oc-card-handoff ${cardHandoff?'visible':''}`}>
                  <span className="hd"></span> Atendimento humano ativo
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* CENTER MAP */}
      <div className="oc-map-area">
        <MapboxMap items={lista} showBases={true} route={routeData}/>
        {routeData&&<RoutePanel route={routeData} base={routeBase} incident={routeIncident} onClose={()=>{setRouteData(null);setRouteBase(null);setRouteIncident(null);}}/>}
      </div>

      {/* SIDE PANEL */}
      <div className={`oc-side-panel ${panelOpen?'open':''}`}>
        {sel&&!viewCitizen&&(
          <>
            {/* Level 1: Occurrence overview */}
            <div className="oc-side-header">
              <div className="oc-side-header-top">
                <span className="oc-side-proto">{sel.protocolo}</span>
                <button className="oc-side-close" onClick={()=>{setSel(null);setViewCitizen(null);}}>&#10005;</button>
              </div>
              <div className="oc-side-title">{sel?.titulo||sel?.title||'Ocorrência'}</div>
              <div className="oc-side-tags">
                <span className={`oc-side-tag sev-${sel?.severidade||'baixa'}`}>{(sel?.severidade||'baixa').toUpperCase()}</span>
                <span className="oc-side-tag status-t">{OC_STATUS_LABELS[currentStep]}</span>
                <span className="oc-side-tag reporters-t">{currentCitizens.length} cidadãos</span>
                <span className="oc-side-tag bairro-t">{sel?.bairro||'—'}</span>
              </div>
              <div className="oc-side-location">
                <OC_SVG.pin width={15} height={15}/>
                {sel?.endereco||`${sel?.bairro||'Maringá'}, Maringá - PR`}
              </div>
            </div>
            <div className="oc-side-body">
              <div className="oc-section-label">Status do atendimento</div>
              <div className="oc-status-flow">
                {OC_STATUS_LABELS.map((label,i)=>(
                  <div key={i} className={`oc-sf-step ${i<currentStep?'done':i===currentStep?'current':''} ${i===2&&currentStep<2?'clickable':''}`}
                    onClick={()=>{if(i===2)handleStatusClick(i);}} style={{cursor:i===2&&currentStep<2?'pointer':'default'}}>{label}</div>
                ))}
              </div>
              {sel.equipe_designada&&<div style={{fontSize:12,color:'var(--accent)',marginTop:4,fontWeight:500}}>Encaminhada para: {sel.equipe_designada}</div>}

              {(()=>{
                const urls=(sel?.midia_urls||[]).filter(Boolean);
                const fotos=urls.filter(u=>!(/\.(mp4|mov|3gp|webm)/i.test(u)||u.includes('video')));
                const videos=urls.filter(u=>/\.(mp4|mov|3gp|webm)/i.test(u)||u.includes('video'));
                if(urls.length<=0)return null;
                return(
                  <>
                    <div className="oc-section-label">Evidências</div>
                    <div className="oc-photos-btn" onClick={()=>{
                      setLbPhotos(fotos);setLbTotal(fotos.length||1);setLbCurrent(0);setLbOpen(true);
                    }}>
                      <OC_SVG.camera width={20} height={20}/>
                      <span className="oc-photos-btn-text">Ver evidências</span>
                      <span className="oc-photos-btn-count">{fotos.length} fotos · {videos.length} vídeos</span>
                    </div>
                  </>
                );
              })()}

              <div className="oc-section-label">Cidadãos que reportaram</div>
              {(currentCitizens||[]).filter(Boolean).map(c=>(
                <div key={c.id} className="oc-citizen-item" onClick={()=>setViewCitizen(c.id)}>
                  <div className="oc-citizen-avatar">{c?.initials||'?'}</div>
                  <div className="oc-citizen-info">
                    <div className="oc-citizen-name">{c?.name||'Cidadão'}</div>
                    <div className="oc-citizen-phone">{ocMaskPhone(c?.phone||'')}</div>
                    <div className={`oc-citizen-handoff-badge ${handoffMap[c.id]?'visible':''}`}><span className="hd"></span> Humano ativo</div>
                  </div>
                  <div className="oc-citizen-right">
                    <div className="oc-citizen-msgs">{c.msgs} msg</div>
                    <div className="oc-citizen-time">{c.time}</div>
                  </div>
                </div>
              ))}
            </div>
            <div className="oc-side-actions">
              <select className="oc-team-select">
                <option>Designar equipe...</option>
                <option>Equipe de Poda</option>
                <option>Bombeiros</option>
                <option>SAMU</option>
                <option>Defesa Civil</option>
                <option>Trânsito</option>
                <option>Energética</option>
              </select>
              <div className="oc-side-actions-row">
                <button className="oc-act-btn oc-act-primary" onClick={handleDespachar} disabled={currentStep>=1}>Despachar</button>
                <button className="oc-act-btn oc-act-blue" onClick={()=>handleTraceRoute(sel)} disabled={loadingRoute}>{loadingRoute?'Calculando...':'Traçar Rota'}</button>
              </div>
              <div className="oc-side-actions-row">
                <button className="oc-act-btn oc-act-green" onClick={()=>{if(confirm('Marcar ocorrência como resolvida?'))updateStatus(sel.id,'resolvido');}} disabled={currentStep>=3}>Resolver</button>
                <button className="oc-act-btn oc-act-secondary">Mesclar</button>
              </div>
            </div>
          </>
        )}

        {sel&&viewCitizen&&activeCitizen&&(
          <>
            {/* Level 2: Citizen chat */}
            <div className="oc-side-header">
              <div className="oc-side-header-top">
                <span className="oc-side-proto">{sel?.protocolo||'—'}</span>
                <button className="oc-side-close" onClick={()=>{setSel(null);setViewCitizen(null);}}>&#10005;</button>
              </div>
              <button className="oc-chat-back" onClick={()=>setViewCitizen(null)}>
                <OC_SVG.back width={16} height={16}/> Voltar para ocorrência
              </button>
              <div className="oc-chat-citizen-header">
                <div className="oc-citizen-avatar">{activeCitizen?.initials||'?'}</div>
                <div>
                  <div className="oc-ch-name">{activeCitizen?.name||'Cidadão'}</div>
                  <div className="oc-ch-phone">{ocMaskPhone(activeCitizen?.phone)}</div>
                </div>
              </div>
            </div>
            <div className="oc-side-body" ref={chatBodyRef}>
              {handoffMap[viewCitizen]&&(
                <div className="oc-handoff-active-bar visible"><span className="hd"></span> Você está controlando esta conversa</div>
              )}
              <button className={`oc-handoff-btn ${handoffMap[viewCitizen]?'release':'take'}`}
                onClick={()=>toggleHandoff(viewCitizen)}>
                {handoffMap[viewCitizen]?<><OC_SVG.handoffRelease width={16} height={16}/> Devolver para IA</>:<><OC_SVG.handoffTake width={16} height={16}/> Assumir conversa</>}
              </button>
              <div className="oc-chat-area">
                {allRelatosForChat.map((r,i)=>{
                  const time=new Date(r.created_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
                  if(r.telefone==='operador')return <div key={i} className="oc-chat-bubble oc-bubble-human"><div className="oc-chat-sender">{r.nome||'Atendente'}</div>{r.mensagem}<div className="oc-chat-time">{time}</div></div>;
                  return <div key={i} className="oc-chat-bubble oc-bubble-citizen"><div className="oc-chat-sender">{activeCitizen?.name||'Cidadão'}</div>{r.mensagem}<div className="oc-chat-time">{time}</div></div>;
                })}
              </div>
            </div>
            <div className={`oc-human-input-area ${handoffMap[viewCitizen]?'visible':''}`}>
              <div className="oc-human-input-label">Respondendo como atendente</div>
              <div className="oc-human-input-row">
                <textarea className="oc-human-input" placeholder="Digite sua mensagem..." rows="1"
                  value={humanMsg} onChange={e=>setHumanMsg(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendHuman();}}}/>
                <button className="oc-human-send" onClick={sendHuman}><OC_SVG.send width={18} height={18}/></button>
              </div>
            </div>
          </>
        )}
      </div>

      {/* LIGHTBOX */}
      {lbOpen&&(
        <div className="oc-lightbox open" onClick={e=>{if(e.target===e.currentTarget)setLbOpen(false);}}>
          <button className="oc-lightbox-close" onClick={()=>setLbOpen(false)}>&#10005;</button>
          {lbPhotos[lbCurrent]?
            <img className="oc-lightbox-img" src={lbPhotos[lbCurrent]} alt={`Foto ${lbCurrent+1}`} style={{objectFit:'contain',padding:0}}/>
            :<div className="oc-lightbox-img">Foto {lbCurrent+1}</div>
          }
          <div className="oc-lightbox-nav">
            <button onClick={()=>setLbCurrent(c=>(c-1+lbTotal)%lbTotal)}>&#8249;</button>
            <span className="oc-lightbox-counter">{lbCurrent+1} / {lbTotal}</span>
            <button onClick={()=>setLbCurrent(c=>(c+1)%lbTotal)}>&#8250;</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── DENÚNCIAS (REDESIGN) ─────────────────────────────────────── */
const DEN_CAT_CLASS={furto_fios:'c-furto',descarte_irregular:'c-descarte',pichacao:'c-pichacao',depredacao:'c-depredacao',trafico_drogas:'c-trafico',generica:'c-generica'};
const DEN_CAT_LABEL={furto_fios:'Furto de Fios',descarte_irregular:'Descarte Irregular',pichacao:'Pichação',depredacao:'Depredação',trafico_drogas:'Tráfico de Drogas',generica:'Aguardando Triagem'};
const DEN_STATUS_CLASS={novo:'s-novo',em_analise:'s-em_analise',encaminhado:'s-encaminhado',encaminhada:'s-encaminhada',procedente:'s-procedente',improcedente:'s-improcedente',rejeitada:'s-rejeitada',recompensa_paga:'s-recompensa_paga'};
const DEN_STATUS_LABEL={novo:'Novo',em_analise:'Em análise',encaminhado:'Encaminhado',encaminhada:'Encaminhada',procedente:'Procedente',improcedente:'Improcedente',rejeitada:'Rejeitada',recompensa_paga:'Recompensa Paga'};
const DEN_PER_PAGE=15;

function _denFmtDate(d){if(!d)return'—';const dt=new Date(d);return dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})}
function _denRelDate(d){if(!d)return'';const diff=Math.floor((Date.now()-new Date(d))/864e5);if(diff===0)return'Hoje';if(diff===1)return'Ontem';return`há ${diff} dias`}
function _denFmtMoney(v){return'R$ '+v.toFixed(2).replace('.',',')}
function _denFmtShort(d){return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}
function _denFmtFull(d){return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})}
function _denGetRange(period,offset){
  const ref=new Date();
  if(period==='day'){ref.setDate(ref.getDate()-offset);return{start:new Date(ref.getFullYear(),ref.getMonth(),ref.getDate()),end:new Date(ref.getFullYear(),ref.getMonth(),ref.getDate(),23,59,59)}}
  if(period==='week'){ref.setDate(ref.getDate()-offset*7);const day=ref.getDay();const s=new Date(ref);s.setDate(ref.getDate()-(day===0?6:day-1));const e=new Date(s);e.setDate(s.getDate()+6);return{start:new Date(s.getFullYear(),s.getMonth(),s.getDate()),end:new Date(e.getFullYear(),e.getMonth(),e.getDate(),23,59,59)}}
  ref.setMonth(ref.getMonth()-offset);return{start:new Date(ref.getFullYear(),ref.getMonth(),1),end:new Date(ref.getFullYear(),ref.getMonth()+1,0,23,59,59)}
}
function _denInRange(d,range){if(!d)return false;const dt=new Date(d);return dt>=range.start&&dt<=range.end}
function _denTrend(c,p){if(p===0&&c===0)return{pct:0,dir:'neutral'};if(p===0)return{pct:100,dir:'up'};const pct=Math.round(((c-p)/p)*100);return{pct:Math.abs(pct),dir:pct>0?'up':pct<0?'down':'neutral'}}

function DenFlagIcon({flag,motivo}){
  const alertSvg=React.createElement('svg',{xmlns:'http://www.w3.org/2000/svg',viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2.5,strokeLinecap:'round',strokeLinejoin:'round',width:16,height:16},[React.createElement('path',{key:'p',d:'m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3'}),React.createElement('path',{key:'l',d:'M12 9v4'}),React.createElement('path',{key:'d',d:'M12 17h.01'})]);
  const flagSvg=React.createElement('svg',{xmlns:'http://www.w3.org/2000/svg',viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2.5,strokeLinecap:'round',strokeLinejoin:'round',width:16,height:16},[React.createElement('path',{key:'a',d:'m3 2 1.578 17.824M12.5 6.5 17 2l0 9.5-4.5-2'}),React.createElement('path',{key:'b',d:'M4.275 16 3.5 22'})]);
  const checkSvg=React.createElement('svg',{xmlns:'http://www.w3.org/2000/svg',viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2.5,strokeLinecap:'round',strokeLinejoin:'round',width:16,height:16},React.createElement('path',{d:'M20 6 9 17l-5-5'}));
  const questionSvg=React.createElement('svg',{xmlns:'http://www.w3.org/2000/svg',viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2.5,strokeLinecap:'round',strokeLinejoin:'round',width:16,height:16},[React.createElement('circle',{key:'c',cx:12,cy:12,r:10}),React.createElement('path',{key:'p',d:'M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3'}),React.createElement('path',{key:'d',d:'M12 17h.01'})]);
  if(flag==='high')return React.createElement('span',{className:'den-flag f-high',title:`⚠ ${motivo||'Foto encaminhada de outra conversa'}`},alertSvg);
  if(flag==='medium')return React.createElement('span',{className:'den-flag f-medium',title:`⚠ ${motivo||'Foto da galeria com mais de 24h'}`},alertSvg);
  if(flag==='low')return React.createElement('span',{className:'den-flag f-low',title:motivo||'Foto enviada da galeria'},flagSvg);
  if(flag==='unknown'||!motivo)return React.createElement('span',{className:'den-flag f-unknown',title:motivo||'Origem não verificada — não foi possível confirmar se a foto é original'},questionSvg);
  return React.createElement('span',{className:'den-flag f-none',title:motivo||'Foto tirada na hora'},checkSvg);
}

function DenEvBadge({type,active}){
  const cam=React.createElement('svg',{xmlns:'http://www.w3.org/2000/svg',viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},[React.createElement('path',{key:'p',d:'M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z'}),React.createElement('circle',{key:'c',cx:12,cy:13,r:3})]);
  const vid=React.createElement('svg',{xmlns:'http://www.w3.org/2000/svg',viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},[React.createElement('rect',{key:'r',x:2,y:6,width:15,height:12,rx:2}),React.createElement('path',{key:'p',d:'m17 9 5-3v12l-5-3z'})]);
  return React.createElement('span',{className:`den-ev-badge ${active?'active':'inactive'}`,title:type==='foto'?'Foto':'Vídeo'},type==='foto'?cam:vid);
}

function Denuncias(){
  const [sel,setSel]=useState(null);
  const [period,setPeriod]=useState('month');
  const [offset,setOffset]=useState(0);
  const [statusFilter,setStatusFilter]=useState('todos');
  const [catFilter,setCatFilter]=useState('');
  const [search,setSearch]=useState('');
  const [page,setPage]=useState(1);

  const range=_denGetRange(period,offset);
  const prevRange=_denGetRange(period,offset+1);
  const periodItems=DEN.filter(d=>_denInRange(d.created_at,range));
  const prevItems=DEN.filter(d=>_denInRange(d.created_at,prevRange));

  // Summary calculations
  const pagoV=periodItems.filter(d=>d.status==='procedente'||d.status==='recompensa_paga').reduce((a,d)=>a+(d.valor_recompensa||0),0);
  const prevPagoV=prevItems.filter(d=>d.status==='procedente'||d.status==='recompensa_paga').reduce((a,d)=>a+(d.valor_recompensa||0),0);
  const totalV=periodItems.reduce((a,d)=>a+(d.valor_recompensa||0),0);
  const prevTotalV=prevItems.reduce((a,d)=>a+(d.valor_recompensa||0),0);
  const analiseN=periodItems.filter(d=>d.status==='em_analise').length;
  const prevAnaliseN=prevItems.filter(d=>d.status==='em_analise').length;
  const cidadaos=new Set(periodItems.map(d=>d.telefone||d.protocolo)).size;
  const prevCidadaos=new Set(prevItems.map(d=>d.telefone||d.protocolo)).size;

  const periodLabel=period==='day'?'dia':period==='week'?'semana':'mês';

  function TrendBadge({cur,prev}){
    const t=_denTrend(cur,prev);
    const arrow=t.dir==='up'?'↑':t.dir==='down'?'↓':'→';
    return React.createElement('div',{className:'sc-sub'},
      React.createElement('span',{className:`den-trend ${t.dir}`},`${arrow} ${t.pct}%`),
      React.createElement('span',{className:'den-trend-lbl'},` vs ${periodLabel} ant.`)
    );
  }

  // Filtered list
  let lista=periodItems;
  if(statusFilter==='suspeitas')lista=lista.filter(d=>d.foto_flag==='high'||d.foto_flag==='medium');
  else if(statusFilter!=='todos')lista=lista.filter(d=>d.status===statusFilter);
  if(catFilter)lista=lista.filter(d=>d.categoria===catFilter);
  if(search){const q=search.toLowerCase();lista=lista.filter(d=>(d.protocolo||'').toLowerCase().includes(q)||(d.mensagem||'').toLowerCase().includes(q)||(d.bairro||'').toLowerCase().includes(q)||(DEN_CAT_LABEL[d.categoria]||'').toLowerCase().includes(q))}

  const totalPages=Math.max(1,Math.ceil(lista.length/DEN_PER_PAGE));
  const safeP=Math.min(page,totalPages);
  const paged=lista.slice((safeP-1)*DEN_PER_PAGE,safeP*DEN_PER_PAGE);
  const showFrom=lista.length===0?0:(safeP-1)*DEN_PER_PAGE+1;
  const showTo=Math.min(safeP*DEN_PER_PAGE,lista.length);

  function hasPhoto(d){return d.midia_urls&&d.midia_urls.some(u=>!(/\.(mp4|mov|avi|webm)/i.test(u)||u.includes('video')))}
  function hasVideo(d){return d.midia_urls&&d.midia_urls.some(u=>/\.(mp4|mov|avi|webm)/i.test(u)||u.includes('video'))}

  function exportCSV(){
    const header='Protocolo;Categoria;Mensagem;Bairro;Status;Recompensa;Data;Flag\n';
    const rows=lista.map(d=>`${d.protocolo};${DEN_CAT_LABEL[d.categoria]||d.categoria};"${(d.mensagem||'').replace(/"/g,"'")}";${d.bairro||''};${DEN_STATUS_LABEL[d.status]||d.status};${d.valor_recompensa||0};${_denFmtDate(d.created_at)};${d.foto_flag||'none'}`).join('\n');
    const blob=new Blob([header+rows],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`denuncias_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  }

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      <div className="scrollable" style={{flex:1,padding:'20px 24px'}}>
        {/* PERIOD SELECTOR */}
        <div className="den-period-bar">
          <div className="den-period-group">
            {['day','week','month'].map(p=>(
              <button key={p} className={`den-period-btn ${period===p?'active':''}`} onClick={()=>{setPeriod(p);setOffset(0);setPage(1)}}>{p==='day'?'Dia':p==='week'?'Semana':'Mês'}</button>
            ))}
          </div>
          <span className="den-period-label"><strong>{_denFmtShort(range.start)}</strong> — <strong>{_denFmtFull(range.end)}</strong></span>
          <div className="den-period-nav">
            <button onClick={()=>{setOffset(o=>o+1);setPage(1)}}>‹</button>
            <button onClick={()=>{setOffset(o=>Math.max(0,o-1));setPage(1)}}>›</button>
          </div>
        </div>

        {/* SUMMARY CARDS */}
        <div className="den-summary-row">
          <div className="den-sc sc-pago"><div className="sc-val">{_denFmtMoney(pagoV)}</div><div className="sc-lbl">Total Pago</div><TrendBadge cur={pagoV} prev={prevPagoV}/></div>
          <div className="den-sc sc-apagar"><div className="sc-val">{_denFmtMoney(totalV-pagoV)}</div><div className="sc-lbl">A Pagar</div><TrendBadge cur={totalV-pagoV} prev={prevTotalV-prevPagoV}/></div>
          <div className="den-sc sc-analise"><div className="sc-val">{analiseN}</div><div className="sc-lbl">Em Análise</div><TrendBadge cur={analiseN} prev={prevAnaliseN}/></div>
          <div className="den-sc sc-total"><div className="sc-val">{_denFmtMoney(totalV)}</div><div className="sc-lbl">Total Geral</div><TrendBadge cur={totalV} prev={prevTotalV}/></div>
          <div className="den-sc sc-denuncias"><div className="sc-val">{periodItems.length}</div><div className="sc-lbl">Denúncias</div><TrendBadge cur={periodItems.length} prev={prevItems.length}/></div>
          <div className="den-sc sc-cidadaos"><div className="sc-val">{cidadaos}</div><div className="sc-lbl">Cidadãos Ativos</div><TrendBadge cur={cidadaos} prev={prevCidadaos}/></div>
        </div>

        {/* TOOLBAR */}
        <div className="den-toolbar">
          <div className="den-search">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" placeholder="Buscar protocolo, mensagem ou bairro..." value={search} onChange={e=>{setSearch(e.target.value);setPage(1)}}/>
          </div>
          <div className="den-filter-group">
            {[['todos','Todos'],['novo','Novo'],['em_analise','Em análise'],['encaminhada','Encaminhado'],['procedente','Procedente'],['suspeitas','⚠ Suspeitas']].map(([k,l])=>(
              <button key={k} className={`den-filter-btn ${statusFilter===k?'active':''}`} onClick={()=>{setStatusFilter(k);setPage(1)}}>{l}</button>
            ))}
          </div>
          <select className="den-cat-select" value={catFilter} onChange={e=>{setCatFilter(e.target.value);setPage(1)}}>
            <option value="">Todas categorias</option>
            {Object.entries(DEN_CAT_LABEL).map(([k,v])=><option key={k} value={k}>{v}</option>)}
          </select>
          <button className="den-export-btn" onClick={exportCSV}>
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
            Exportar
          </button>
        </div>

        {/* TABLE */}
        <div className="den-table-wrap">
          <table>
            <thead><tr><th>Protocolo</th><th>Categoria</th><th>Mensagem</th><th>Bairro</th><th>Status</th><th>Evidência</th><th>Recompensa</th><th>Data</th></tr></thead>
            <tbody>
              {paged.map(d=>(
                <tr key={d.id} onClick={()=>setSel(d)} style={{background:sel?.id===d.id?'rgba(196,30,58,.04)':''}}>
                  <td><span className="den-proto">{d.protocolo}</span></td>
                  <td><span className={`den-cat-text ${DEN_CAT_CLASS[d.categoria]||'c-generica'}`}>{DEN_CAT_LABEL[d.categoria]||d.categoria}</span></td>
                  <td><span className="den-msg" title={d.mensagem}>{d.mensagem}</span></td>
                  <td><span className="den-bairro">{d.bairro||'—'}</span></td>
                  <td><span className={`den-status ${DEN_STATUS_CLASS[d.status]||'s-novo'}`}>{DEN_STATUS_LABEL[d.status]||d.status}</span></td>
                  <td><div className="den-ev-cell"><DenEvBadge type="foto" active={hasPhoto(d)}/><DenEvBadge type="video" active={hasVideo(d)}/><DenFlagIcon flag={d.foto_flag||'none'} motivo={d.foto_flag_motivo||''}/></div></td>
                  <td>{d.valor_recompensa?<span className="den-recomp">{_denFmtMoney(d.valor_recompensa)}</span>:<span className="den-recomp none">—</span>}</td>
                  <td><span className="den-date">{_denFmtDate(d.created_at)}<span className="rel">{_denRelDate(d.created_at)}</span></span></td>
                </tr>
              ))}
              {paged.length===0&&<tr><td colSpan={8} style={{textAlign:'center',padding:40,color:'var(--text-muted)',fontFamily:"'Outfit',sans-serif"}}>Nenhuma denúncia encontrada no período.</td></tr>}
            </tbody>
          </table>
          <div className="den-footer">
            <span>Exibindo <strong>{showFrom}–{showTo}</strong> de <strong>{lista.length}</strong> registros</span>
            <div className="den-pagination">
              <button className="den-page-btn" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={safeP<=1}>‹</button>
              {Array.from({length:totalPages},(_,i)=>i+1).slice(Math.max(0,safeP-3),safeP+2).map(n=>(
                <button key={n} className={`den-page-btn ${n===safeP?'active':''}`} onClick={()=>setPage(n)}>{n}</button>
              ))}
              <button className="den-page-btn" onClick={()=>setPage(p=>Math.min(totalPages,p+1))} disabled={safeP>=totalPages}>›</button>
            </div>
          </div>
        </div>
      </div>

      {/* MODAL DETALHE */}
      {sel&&(
        <div className="modal-overlay" onClick={()=>setSel(null)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 22px',borderBottom:'1px solid var(--border)',flexShrink:0}}>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <span style={{fontFamily:"'Outfit',sans-serif",fontSize:14,fontWeight:700,color:'var(--text)'}}>{sel.protocolo}</span>
                <span className={`den-cat-text ${DEN_CAT_CLASS[sel.categoria]||'c-generica'}`} style={{fontSize:13}}>{DEN_CAT_LABEL[sel.categoria]||sel.categoria}</span>
                <span className={`den-status ${DEN_STATUS_CLASS[sel.status]||'s-novo'}`} style={{fontSize:13}}>{DEN_STATUS_LABEL[sel.status]||sel.status}</span>
              </div>
              <button onClick={()=>setSel(null)} style={{width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-muted)',cursor:'pointer',borderRadius:8,border:'none',background:'none',fontSize:18}}>✕</button>
            </div>
            <div className="scrollable" style={{flex:1,padding:'20px 22px',minHeight:0}}>
              <p style={{fontFamily:"'Outfit',sans-serif",fontSize:14,lineHeight:1.7,marginBottom:22,color:'var(--text)'}}>{sel.mensagem}</p>
              {sel.midia_urls&&sel.midia_urls.length>0&&(
                <div style={{marginBottom:22}}>
                  <div style={{fontFamily:"'Outfit',sans-serif",fontSize:11,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.8px',marginBottom:10,display:'flex',alignItems:'center',gap:6}}>
                    Evidências ({sel.midia_urls.length})
                    {sel.foto_flag==='high'&&<span style={{fontSize:11,fontWeight:700,color:'#e74c3c',background:'rgba(231,76,60,.12)',padding:'2px 8px',borderRadius:4,marginLeft:6}}>⚠ {sel.foto_flag_motivo||'Foto encaminhada'}</span>}
                    {sel.foto_flag==='medium'&&<span style={{fontSize:11,fontWeight:700,color:'#f1c40f',background:'rgba(241,196,15,.12)',padding:'2px 8px',borderRadius:4,marginLeft:6}}>⚠ {sel.foto_flag_motivo||'Foto da galeria antiga'}</span>}
                    {sel.foto_flag==='low'&&<span style={{fontSize:11,fontWeight:700,color:'#e67e22',background:'rgba(230,126,34,.12)',padding:'2px 8px',borderRadius:4,marginLeft:6}}>⚠ {sel.foto_flag_motivo||'Foto da galeria'}</span>}
                    {sel.foto_flag==='none'&&sel.foto_flag_motivo&&<span style={{fontSize:11,fontWeight:700,color:'#2ecc71',background:'rgba(46,204,113,.12)',padding:'2px 8px',borderRadius:4,marginLeft:6}}>✓ {sel.foto_flag_motivo}</span>}
                    {(sel.foto_flag==='unknown'||(!sel.foto_flag_motivo&&sel.foto_flag!=='high'&&sel.foto_flag!=='medium'&&sel.foto_flag!=='low'))&&<span style={{fontSize:11,fontWeight:700,color:'#f1c40f',background:'rgba(241,196,15,.1)',padding:'2px 8px',borderRadius:4,marginLeft:6}}>? Origem não verificada</span>}
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:sel.midia_urls.length===1?'1fr':'1fr 1fr',gap:10}}>
                    {sel.midia_urls.map((url,i)=>{
                      const isVideo=/\.(mp4|mov|avi|webm)/i.test(url)||url.includes('video');
                      return isVideo?(
                        <div key={i} style={{position:'relative',borderRadius:10,overflow:'hidden',border:'1px solid var(--border)',background:'#000'}}>
                          <video src={url} controls muted playsInline style={{width:'100%',maxHeight:240,objectFit:'contain',display:'block'}}/>
                          <div style={{position:'absolute',top:8,left:8,background:'rgba(0,0,0,.75)',color:'#fbbf24',fontSize:11,fontWeight:700,padding:'3px 8px',borderRadius:4}}>Vídeo</div>
                        </div>
                      ):(
                        <div key={i} style={{position:'relative',borderRadius:10,overflow:'hidden',border:'1px solid var(--border)',cursor:'pointer'}} onClick={()=>window.open(url,'_blank')}>
                          <img src={url} alt={`Evidência ${i+1}`} style={{width:'100%',maxHeight:240,objectFit:'cover',display:'block'}}/>
                          <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'8px 10px',background:'linear-gradient(transparent,rgba(0,0,0,.8))',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                            <span style={{color:'#fff',fontSize:11,fontWeight:600}}>Foto {sel.midia_urls.length>1?i+1:''}</span>
                            <span style={{color:'var(--accent-light)',fontSize:10,fontWeight:600}}>Ampliar ↗</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
              <div style={{display:'grid',gap:10,fontSize:13,marginBottom:24,fontFamily:"'Outfit',sans-serif"}}>
                {[
                  ['Bairro',sel.bairro||(sel.latitude?`GPS: ${Number(sel.latitude).toFixed(4)}, ${Number(sel.longitude).toFixed(4)}`:'Não informado')],
                  sel.endereco&&['Endereço',sel.endereco],
                  ['Cidadania Ativa',sel.cidadania_ativa?'Sim':'Não'],
                  sel.valor_recompensa&&['Recompensa',`R$ ${sel.valor_recompensa.toLocaleString('pt-BR')}`],
                  ['Data',_denFmtDate(sel.created_at)+' ('+_denRelDate(sel.created_at)+')'],
                ].filter(Boolean).map(([l,v])=>(
                  <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'10px 14px',background:'rgba(255,255,255,.02)',borderRadius:8,border:'1px solid var(--border)'}}>
                    <span style={{color:'var(--text-muted)'}}>{l}</span>
                    <span style={{fontWeight:600,color:l==='Cidadania Ativa'&&sel.cidadania_ativa?'#2ecc71':l==='Recompensa'?'#2ecc71':'var(--text)'}}>{v}</span>
                  </div>
                ))}
                {sel.encaminhada_para&&(
                  <div style={{marginTop:6,padding:'12px 14px',background:'rgba(139,92,246,.08)',borderRadius:8,border:'1px solid rgba(139,92,246,.25)'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span style={{color:'#a78bfa',fontWeight:600,fontSize:13}}>→ Encaminhada para: {sel.encaminhada_para}</span>
                      <span style={{color:'#8b5cf6',fontSize:11,fontWeight:500}}>{sel.encaminhada_em?new Date(sel.encaminhada_em).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—'}</span>
                    </div>
                  </div>
                )}
              </div>

              {/* ── Rota & Despacho ── */}
              {sel.latitude&&sel.longitude&&(
                <div style={{background:'rgba(255,255,255,.02)',border:'1px solid var(--border)',borderRadius:10,padding:14,marginTop:12}}>
                  <div style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:.8,marginBottom:10}}>📍 Rota & Despacho</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                    <a href={`https://www.google.com/maps/dir/?api=1&destination=${sel.latitude},${sel.longitude}&travelmode=driving`} target="_blank" rel="noopener"
                      style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,padding:'10px',background:'rgba(16,185,129,.08)',border:'1px solid rgba(16,185,129,.2)',borderRadius:8,color:'#10b981',fontSize:12,fontWeight:600,textDecoration:'none'}}>🗺️ Google Maps</a>
                    <a href={`https://www.waze.com/live-map/directions?to=ll.${sel.latitude}%2C${sel.longitude}`} target="_blank" rel="noopener"
                      style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,padding:'10px',background:'rgba(255,255,255,.04)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text-secondary)',fontSize:12,fontWeight:600,textDecoration:'none'}}>🧭 Waze</a>
                    <a href={`https://wa.me/?text=${encodeURIComponent(`🚨 DESPACHO — DENÚNCIA\n📋 ${sel.protocolo}\n📍 ${sel.endereco||sel.bairro||''}\n🏘️ ${sel.bairro||''}\n📢 ${(sel.categoria||'').replace(/_/g,' ').toUpperCase()}\n🗺️ https://www.google.com/maps?q=${sel.latitude},${sel.longitude}`)}`} target="_blank" rel="noopener"
                      style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,padding:'10px',background:'rgba(255,255,255,.04)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text-secondary)',fontSize:12,fontWeight:600,textDecoration:'none'}}>📲 WhatsApp</a>
                    <button onClick={()=>{navigator.clipboard.writeText(`🚨 DESPACHO — DENÚNCIA\n📋 ${sel.protocolo}\n📍 ${sel.endereco||sel.bairro||''}\n🏘️ ${sel.bairro||''}\n📢 ${(sel.categoria||'').replace(/_/g,' ').toUpperCase()}\n🗺️ https://www.google.com/maps?q=${sel.latitude},${sel.longitude}`);alert('Despacho copiado!')}}
                      style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,padding:'10px',background:'rgba(255,255,255,.04)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text-secondary)',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>📋 Copiar Despacho</button>
                  </div>
                </div>
              )}

              <div style={{display:'flex',gap:10,marginTop:12}}>
                {sel.cidadania_ativa&&sel.status!=='procedente'&&sel.status!=='recompensa_paga'?(
                  <button className="btn btn-primary" style={{flex:1,justifyContent:'center',background:'linear-gradient(135deg,#059669,#10b981)'}} onClick={async()=>{
                    try{const res=await fetch(API_URL+'/api/denuncias/'+sel.id+'/validar-recompensa',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({operador:'admin'})});const d=await res.json();if(d.ok){alert(`✅ Denúncia validada! Recompensa de R$ ${d.valor} criada na aba Recompensas.`);setSel(null)}else{alert('Erro: '+(d.error||'Falha'))}}catch(e){alert('Erro: '+e.message)}
                  }}>💰 Validar e Encaminhar para Pagamento</button>
                ):(
                  <button className="btn btn-primary" style={{flex:1,justifyContent:'center'}} onClick={async()=>{
                    try{const res=await fetch(API_URL+'/api/denuncias/'+sel.id+'/status',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'procedente',operador:'admin'})});if(res.ok){alert('Denúncia marcada como procedente!');setSel(null)}else{const err=await res.json().catch(()=>({}));alert('Erro: '+(err.detail||res.statusText))}}catch(e){alert('Erro: '+e.message)}
                  }}>✓ Procedente</button>
                )}
                <button className="btn btn-outline" style={{flex:1,justifyContent:'center'}} onClick={async()=>{
                  const destino=prompt('Encaminhar para qual órgão?\n\n1 - Polícia Civil\n2 - Guarda Municipal\n3 - Meio Ambiente\n4 - Fiscalização\n\nDigite o número:');
                  const orgaos={'1':'Polícia Civil','2':'Guarda Municipal','3':'Meio Ambiente','4':'Fiscalização'};const orgao=orgaos[destino];if(!orgao){if(destino!==null)alert('Opção inválida.');return}
                  try{const res=await fetch(API_URL+'/api/denuncias/'+sel.id+'/status',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'encaminhada',operador:'admin',encaminhada_para:orgao,notas:'Encaminhada para: '+orgao})});if(res.ok){const updated=await res.json();setSel(prev=>({...prev,status:'encaminhada',encaminhada_para:orgao,encaminhada_em:updated.encaminhada_em||new Date().toISOString(),...updated}))}else{const err=await res.json().catch(()=>({}));alert('Erro: '+(err.detail||res.statusText))}}catch(e){alert('Erro: '+e.message)}
                }}>→ Encaminhar</button>
                <button className="btn btn-danger" style={{flex:1,justifyContent:'center'}} onClick={async()=>{
                  const motivo=prompt('Motivo (opcional):');
                  try{const res=await fetch(API_URL+'/api/denuncias/'+sel.id+'/status',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'improcedente',operador:'admin',notas:motivo||''})});if(res.ok){alert('Denúncia marcada como improcedente.');setSel(null)}else{const err=await res.json().catch(()=>({}));alert('Erro: '+(err.detail||res.statusText))}}catch(e){alert('Erro: '+e.message)}
                }}>✕ Improcedente</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── SOS MULHER ───────────────────────────────────────────────── */
function SOSMulher(){
  const [sel,setSel]=useState(SOS[0]);
  const [routeData,setRouteData]=useState(null);
  const [routeBase,setRouteBase]=useState(null);
  const [routeIncident,setRouteIncident]=useState(null);
  const [loadingRoute,setLoadingRoute]=useState(false);
  const [notas,setNotas]=useState('');
  const [salvandoNotas,setSalvandoNotas]=useState(false);
  const [histModal,setHistModal]=useState(null);
  const [chatModal,setChatModal]=useState(null);
  const [sosMsg,setSosMsg]=useState('');
  const [sosSending,setSosSending]=useState(false);
  const [sosHandoff,setSosHandoff]=useState(false);
  const [sosMensagens,setSosMensagens]=useState([]);
  const sosChatRef=useRef(null);

  // Atualiza notas quando muda a seleção
  useEffect(()=>{setNotas(sel?.notas||'');},[sel?.id]);

  // Reset handoff ao fechar modal
  useEffect(()=>{if(!chatModal){setSosHandoff(false);setSosMensagens([]);}},[chatModal]);

  // Fetch mensagens quando abre modal
  useEffect(()=>{
    if(!chatModal) return;
    fetch(API_URL+'/api/sos/alertas/'+chatModal.id+'/mensagens')
      .then(r=>r.ok?r.json():[]).then(d=>setSosMensagens(d)).catch(()=>{});
    // Polling a cada 5s enquanto modal aberto
    const iv=setInterval(()=>{
      fetch(API_URL+'/api/sos/alertas/'+chatModal.id+'/mensagens')
        .then(r=>r.ok?r.json():[]).then(d=>setSosMensagens(d)).catch(()=>{});
    },5000);
    return()=>clearInterval(iv);
  },[chatModal?.id]);

  // Scroll chat pro final
  useEffect(()=>{if(sosChatRef.current)sosChatRef.current.scrollTop=sosChatRef.current.scrollHeight;},[sosMensagens]);

  async function toggleSosHandoff(){
    if(!chatModal) return;
    const novoEstado=!sosHandoff;
    setSosHandoff(novoEstado);
    try{
      await fetch(API_URL+'/api/sos/alertas/'+chatModal.id+'/handoff',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({telefone:chatModal.telefone,ativo:novoEstado,operador:'admin'})
      });
    }catch(e){console.error('Handoff error:',e);}
  }

  async function sendSosMessage(){
    if(!sosMsg.trim()||!chatModal) return;
    setSosSending(true);
    try{
      await fetch(API_URL+'/api/sos/alertas/'+chatModal.id+'/send-message',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({telefone:chatModal.telefone,mensagem:sosMsg.trim(),operador:'Atendente SOS'})
      });
      // Reload mensagens
      const data=await fetch(API_URL+'/api/sos/alertas/'+chatModal.id+'/mensagens').then(r=>r.json());
      setSosMensagens(data);
      setSosMsg('');
    }catch(e){console.error('Erro ao enviar:',e);}
    setSosSending(false);
  }

  async function handleTraceRoute(item){
    setLoadingRoute(true);
    const base=nearestBase(item.lat,item.lng,'pm');
    if(!base){setLoadingRoute(false);return;}
    const r=await fetchRoute(base.lng,base.lat,item.lng,item.lat);
    if(r){setRouteData(r);setRouteBase(base);setRouteIncident({...item,severidade:'critica',titulo:'SOS: '+(item.sos_cadastros?.nome||item.telefone)});}
    setLoadingRoute(false);
  }

  async function handleAceitar(){
    if(!sel) return;
    try{
      const res=await fetch(API_URL+'/api/sos/alertas/'+sel.id+'/aceitar',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({operador:'admin'})});
      if(res.ok){alert('✅ Atendimento aceito! Sirene desativada.');setSel(prev=>({...prev,status:'attending'}));}
      else{const err=await res.json().catch(()=>({}));alert('Erro: '+(err.detail||res.statusText));}
    }catch(e){alert('Erro: '+e.message);}
  }

  async function handleResolver(){
    if(!sel) return;
    const motivo=prompt('Notas de resolução (opcional):');
    try{
      const res=await fetch(API_URL+'/api/sos/alertas/'+sel.id+'/resolver',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({notas:motivo||notas||''})});
      if(res.ok){alert('✅ Alerta resolvido.');setSel(null);}
      else{const err=await res.json().catch(()=>({}));alert('Erro: '+(err.detail||res.statusText));}
    }catch(e){alert('Erro: '+e.message);}
  }

  async function handleSalvarNotas(){
    if(!sel) return;
    setSalvandoNotas(true);
    try{
      await fetch(API_URL+'/api/sos/alertas/'+sel.id+'/notas',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({notas})});
    }catch(e){}
    setSalvandoNotas(false);
  }

  const isAttending=sel?.status==='attending';

  return(
    <div style={{display:'flex',height:'100%',overflow:'hidden',position:'relative'}}>
      {/* ── SIDEBAR ESQUERDA ── */}
      <div style={{width:300,flexShrink:0,borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',background:'var(--surface)'}}>
        <div style={{padding:'16px 16px 10px'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:'#dc2626',animation:'pulse 1s infinite'}}/>
            <span style={{fontSize:12,fontWeight:600,color:'#dc2626',textTransform:'uppercase',letterSpacing:'1px'}}>Alertas Ativos</span>
            <span className="nav-badge" style={{marginLeft:'auto'}}>{SOS.length}</span>
          </div>
        </div>
        <div className="scrollable" style={{flex:1,minHeight:0}}>
          {SOS.length===0&&(
            <div style={{padding:'20px 16px',textAlign:'center',color:'var(--text-muted)',fontSize:13}}>Nenhum alerta ativo</div>
          )}
          {SOS.map(s=>{
            const isAtt=s.status==='attending';
            return(
              <div key={s.id} onClick={()=>{setSel(s);setChatModal(s);setSosChatHandoff(false);setSosMsg('');}} style={{margin:'0 10px 6px',padding:'14px 16px',borderRadius:8,background:sel?.id===s.id?'rgba(220,38,38,.08)':isAtt?'rgba(251,191,36,.05)':'rgba(220,38,38,.03)',border:`1px solid ${sel?.id===s.id?'rgba(220,38,38,.3)':isAtt?'rgba(251,191,36,.2)':'rgba(220,38,38,.12)'}`,cursor:'pointer'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontWeight:600,fontSize:14,color:'#fff'}}>{s.sos_cadastros?.nome||s.telefone}</span>
                  <span style={{fontSize:12,color:isAtt?'#fbbf24':'#f87171'}}>{ago(s.created_at)}</span>
                </div>
                <div style={{fontSize:12,color:'var(--text-secondary)',marginBottom:4}}>{s.sos_cadastros?.endereco||'Endereço não informado'}</div>
                <span className={`badge ${isAtt?'b-warn':'b-red'}`} style={{fontSize:10}}>{isAtt?'Em atendimento':'Aguardando'}</span>
              </div>
            );
          })}
          {/* Histórico real */}
          {SOS_HIST.length>0&&(
            <>
              <div style={{height:1,background:'var(--border)',margin:'14px 14px 10px'}}/>
              <div style={{padding:'0 16px 6px',fontSize:10,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'1px'}}>Histórico ({SOS_HIST.length})</div>
              {SOS_HIST.slice(0,15).map(h=>(
                <div key={h.id} onClick={()=>setHistModal(h)} style={{padding:'10px 16px',borderBottom:'1px solid var(--border)',cursor:'pointer',transition:'background .1s'}}
                  onMouseEnter={e=>e.currentTarget.style.background='rgba(74,222,128,.04)'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span style={{fontSize:13,color:'var(--text)',fontWeight:500}}>{h.sos_cadastros?.nome||h.telefone}</span>
                    <span className="badge b-green" style={{fontSize:10}}>Resolvido</span>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}}>
                    <span style={{fontSize:11,color:'var(--text-muted)'}}>{h.sos_cadastros?.endereco||'—'}</span>
                    <span style={{fontSize:10,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>{h.resolvido_em?new Date(h.resolvido_em).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}):''}</span>
                  </div>
                </div>
              ))}
            </>
          )}
        </div>
      </div>
      {/* ── CONTEÚDO PRINCIPAL ── */}
      {/* ── MODAL HISTÓRICO ── */}
      {histModal&&(()=>{
        const h=histModal;
        const cad=h.sos_cadastros;
        const criadoEm=h.created_at?new Date(h.created_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'}):'—';
        const resolvidoEm=h.resolvido_em?new Date(h.resolvido_em).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'}):'—';
        const duracao=(()=>{
          if(!h.created_at||!h.resolvido_em) return '—';
          const ms=new Date(h.resolvido_em)-new Date(h.created_at);
          const min=Math.floor(ms/60000);
          if(min<60) return `${min} min`;
          const hrs=Math.floor(min/60);
          return `${hrs}h ${min%60}min`;
        })();
        return(
          <div className="modal-overlay" onClick={()=>setHistModal(null)}>
            <div className="modal-box" onClick={e=>e.stopPropagation()} style={{maxWidth:620}}>
              {/* Header */}
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 22px',borderBottom:'1px solid var(--border)',flexShrink:0}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:18}}>🛡️</span>
                  <div>
                    <div style={{fontSize:16,fontWeight:700,color:'#fff'}}>{cad?.nome||h.telefone}</div>
                    <span className="badge b-green" style={{fontSize:10,marginTop:4}}>Resolvido</span>
                  </div>
                </div>
                <button onClick={()=>setHistModal(null)} style={{width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-muted)',cursor:'pointer',borderRadius:8,border:'none',background:'none',fontSize:18}}>✕</button>
              </div>
              {/* Body */}
              <div className="scrollable" style={{flex:1,padding:'20px 22px',minHeight:0}}>
                {/* Timeline */}
                <div style={{marginBottom:22}}>
                  <div style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.8px',marginBottom:12}}>Linha do Tempo</div>
                  <div style={{position:'relative',paddingLeft:24}}>
                    <div style={{position:'absolute',left:7,top:6,bottom:6,width:2,background:'var(--border)'}}/>
                    {[
                      {icon:'🚨',color:'#dc2626',label:'Alerta Recebido',detail:`Código: "${h.codigo_usado||'—'}"`,time:criadoEm},
                      h.atendido_por&&{icon:'🔔',color:'#fbbf24',label:'Atendimento Aceito',detail:`Operador: ${h.atendido_por}`,time:''},
                      h.latitude&&{icon:'📍',color:'#3b82f6',label:'Localização Recebida',detail:`${Number(h.latitude).toFixed(5)}, ${Number(h.longitude).toFixed(5)}`,time:''},
                      {icon:'✅',color:'#4ade80',label:'Caso Resolvido',detail:`Duração total: ${duracao}`,time:resolvidoEm},
                    ].filter(Boolean).map((ev,i)=>(
                      <div key={i} style={{display:'flex',gap:12,marginBottom:16,position:'relative'}}>
                        <div style={{width:16,height:16,borderRadius:'50%',background:ev.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,flexShrink:0,zIndex:1,border:'2px solid var(--bg)'}}/>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{ev.label}</div>
                          <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>{ev.detail}</div>
                          {ev.time&&<div style={{fontSize:11,color:'var(--text-muted)',fontFamily:'var(--font-mono)',marginTop:2}}>{ev.time}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                {/* Dados da vítima */}
                {cad&&(
                  <div style={{marginBottom:22}}>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.8px',marginBottom:10}}>Dados da Vítima</div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                      {[
                        ['Nome',cad.nome],
                        ['Telefone',h.telefone],
                        ['Endereço',cad.endereco],
                        ['Referência',cad.referencia],
                        ['Agressor',cad.agressor],
                        cad.contato_confianca_nome&&['Contato Confiança',`${cad.contato_confianca_nome} — ${cad.contato_confianca_telefone||''}`],
                      ].filter(Boolean).filter(([,v])=>v).map(([l,v])=>(
                        <div key={l} style={{background:'rgba(255,255,255,.02)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 12px'}}>
                          <div style={{fontSize:10,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:3}}>{l}</div>
                          <div style={{fontSize:13,color:l==='Agressor'?'#f87171':'var(--text)',fontWeight:500,wordBreak:'break-word'}}>{v}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {/* Notas */}
                {h.notas&&(
                  <div style={{marginBottom:22}}>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.8px',marginBottom:10}}>Notas do Operador</div>
                    <div style={{background:'rgba(255,255,255,.02)',border:'1px solid var(--border)',borderRadius:8,padding:'14px 16px',fontSize:13,color:'var(--text)',lineHeight:1.7,whiteSpace:'pre-wrap'}}>{h.notas}</div>
                  </div>
                )}
                {/* Sem cadastro */}
                {!cad&&(
                  <div style={{background:'rgba(251,191,36,.04)',border:'1px solid rgba(251,191,36,.15)',borderRadius:8,padding:'14px 16px',marginBottom:22}}>
                    <div style={{fontSize:13,color:'#fbbf24',fontWeight:500}}>⚠️ Vítima não cadastrada no programa</div>
                    <div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>Telefone: {h.telefone}</div>
                    <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>Esta pessoa não possui cadastro no Mulher Segura. Os dados como nome, endereço e agressor não estão disponíveis.</div>
                  </div>
                )}
                {/* Localização */}
                {h.latitude&&(
                  <div>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.8px',marginBottom:10}}>Localização Registrada</div>
                    <a href={`https://www.google.com/maps?q=${h.latitude},${h.longitude}`} target="_blank" rel="noopener"
                      style={{display:'flex',alignItems:'center',gap:8,background:'rgba(59,130,246,.06)',border:'1px solid rgba(59,130,246,.15)',borderRadius:8,padding:'12px 16px',textDecoration:'none',color:'#60a5fa',fontSize:13,fontWeight:500}}>
                      📍 Ver no Google Maps — {Number(h.latitude).toFixed(5)}, {Number(h.longitude).toFixed(5)}
                    </a>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      })()}
      {/* ── MODAL ALERTA ATIVO — com chat do operador ── */}
      {chatModal&&(()=>{
        const s=chatModal;
        const cad=s.sos_cadastros;
        const isAtt=s.status==='attending';
        const criadoEm=s.created_at?new Date(s.created_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'}):'—';
        return(
          <div className="modal-overlay" onClick={()=>setChatModal(null)}>

/* ─── FEEDBACKS ────────────────────────────────────────────────── */
function Feedbacks(){
  const [sel,setSel]=useState(null);
  const [msgs,setMsgs]=useState([]);
  const [filtCat,setFiltCat]=useState('');
  const [filtPri,setFiltPri]=useState('');
  const [filtSta,setFiltSta]=useState('ativos');
  const [fbkHandoff,setFbkHandoff]=useState(false);
  const [fbkMsg,setFbkMsg]=useState('');
  const [fbkSending,setFbkSending]=useState(false);
  const fbkChatRef=useRef(null);

  const lista=FBK.filter(f=>{
    if(filtCat&&f.categoria!==filtCat)return false;
    if(filtPri&&f.prioridade!==filtPri)return false;
    if(filtSta==='ativos')return['aberto','em_atendimento','encaminhado'].includes(f.status);
    if(filtSta==='resolvido')return f.status==='resolvido';
    return true;
  });

  function abrirConversa(f){
    setSel(f);setFbkHandoff(false);setFbkMsg('');
    fetch(API_URL+'/api/feedbacks/'+f.id+'/mensagens').then(r=>r.ok?r.json():[]).then(d=>setMsgs(d)).catch(()=>setMsgs([]));
  }
  function fecharModal(){setSel(null);setMsgs([]);setFbkHandoff(false);}
  function mudarStatus(id,novo){
    fetch(API_URL+'/api/feedbacks/'+id+'/status',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:novo,operador:'admin'})});
    if(sel?.id===id)setSel(prev=>({...prev,status:novo}));
  }

  // Polling mensagens enquanto modal aberto
  useEffect(()=>{
    if(!sel) return;
    const iv=setInterval(()=>{
      fetch(API_URL+'/api/feedbacks/'+sel.id+'/mensagens').then(r=>r.ok?r.json():[]).then(d=>setMsgs(d)).catch(()=>{});
    },5000);
    return()=>clearInterval(iv);
  },[sel?.id]);

  useEffect(()=>{if(fbkChatRef.current)fbkChatRef.current.scrollTop=fbkChatRef.current.scrollHeight;},[msgs]);

  async function toggleFbkHandoff(){
    if(!sel) return;
    const novoEstado=!fbkHandoff;
    setFbkHandoff(novoEstado);
    try{
      await fetch(API_URL+'/api/feedbacks/'+sel.id+'/handoff',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({telefone:sel.telefone,ativo:novoEstado,operador:'admin'})
      });
    }catch(e){console.error('Handoff error:',e);}
  }

  async function sendFbkMsg(){
    if(!fbkMsg.trim()||!sel) return;
    setFbkSending(true);
    try{
      await fetch(API_URL+'/api/feedbacks/'+sel.id+'/send-message',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({telefone:sel.telefone,mensagem:fbkMsg.trim(),operador:'Atendente'})
      });
      const data=await fetch(API_URL+'/api/feedbacks/'+sel.id+'/mensagens').then(r=>r.json());
      setMsgs(data);setFbkMsg('');
    }catch(e){console.error('Erro:',e);}
    setFbkSending(false);
  }

  /* ── AI PULSE — análise IA a cada 5 min ── */
  const [aiPulse,setAiPulse]=useState('Analisando feedbacks da cidade...');
  const [aiPulseTime,setAiPulseTime]=useState(null);
  const aiPulseRef=useRef(null);

  function gerarAiPulse(){
    const all=FBK;
    if(all.length===0){setAiPulse('Nenhum feedback registrado ainda.');setAiPulseTime(new Date());return;}
    const criticos=all.filter(f=>f.prioridade==='critico').length;
    const urgentes=all.filter(f=>f.prioridade==='urgente').length;
    /* Top categoria */
    const catCount={};all.forEach(f=>{const c=f.categoria||'outros';catCount[c]=(catCount[c]||0)+1;});
    const topCat=Object.entries(catCount).sort((a,b)=>b[1]-a[1])[0];
    const topCatLabel=CAT_FBK[topCat?.[0]]?.label||topCat?.[0]||'—';
    /* Top bairro */
    const bCount={};all.forEach(f=>{if(f.bairro)bCount[f.bairro]=(bCount[f.bairro]||0)+1;});
    const topBairro=Object.entries(bCount).sort((a,b)=>b[1]-a[1])[0];
    /* Sentimento dominante */
    const negCount=all.filter(f=>f.sentimento==='negativo').length;
    const posCount=all.filter(f=>f.sentimento==='positivo').length;
    /* Gerar texto */
    let txt='';
    if(criticos>5) txt=`🔴 Crítico! ${criticos} feedbacks críticos detectados. Foco em ${topCatLabel}${topBairro?` na região ${topBairro[0]}`:''}.  Ação imediata necessária.`;
    else if(urgentes>5) txt=`🟡 Atenção: ${urgentes} feedbacks urgentes. Principal tema: ${topCatLabel}. ${negCount>posCount?'Sentimento predominante negativo — monitorar de perto.':''}`;
    else if(negCount>posCount*2) txt=`😔 Sentimento negativo predominante (${negCount} de ${all.length}). Principais reclamações em ${topCatLabel}${topBairro?`, concentradas em ${topBairro[0]}`:''}.`;
    else if(posCount>negCount) txt=`😊 Tendência positiva! ${posCount} elogios de ${all.length} feedbacks. Destaque para ${topCatLabel}. Maringá está no caminho certo!`;
    else txt=`📊 ${all.length} feedbacks analisados. ${topCatLabel} é o tema mais recorrente${topBairro?` (${topBairro[0]} lidera)`:``}. ${criticos>0?`${criticos} críticos requerem atenção.`:`Situação estável.`}`;
    setAiPulse(txt);setAiPulseTime(new Date());
  }

  useEffect(()=>{
    gerarAiPulse();
    aiPulseRef.current=setInterval(gerarAiPulse,300000);
    return()=>clearInterval(aiPulseRef.current);
  },[]);

  /* ── Computed stats ── */
  const allFbk=FBK;
  const feedbacksHoje=allFbk.filter(f=>{const d=new Date(f.created_at);const t=new Date();return d.toDateString()===t.toDateString();}).length;
  const bairroCount={};allFbk.forEach(f=>{if(f.bairro)bairroCount[f.bairro]=(bairroCount[f.bairro]||0)+1;});
  const topBairroEntry=Object.entries(bairroCount).sort((a,b)=>b[1]-a[1])[0];
  const catCountAll={};allFbk.forEach(f=>{const c=f.categoria||'outros';catCountAll[c]=(catCountAll[c]||0)+1;});
  const topCatEntry=Object.entries(catCountAll).sort((a,b)=>b[1]-a[1])[0];
  const topCatInfo=CAT_FBK[topCatEntry?.[0]]||{label:topCatEntry?.[0]||'—',color:'#8b949e'};

  /* Sentimentos */
  const sentCounts={positivo:0,neutro:0,urgente:0,critico:0};
  allFbk.forEach(f=>{
    if(f.prioridade==='positivo')sentCounts.positivo++;
    else if(f.prioridade==='neutro')sentCounts.neutro++;
    else if(f.prioridade==='urgente')sentCounts.urgente++;
    else if(f.prioridade==='critico')sentCounts.critico++;
  });
  const sentTotal=Math.max(allFbk.length,1);

                {(()=>{const cat=CAT_FBK[sel.categoria];return cat?<span style={{fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:6,background:`${cat.color}20`,color:cat.color,border:`1px solid ${cat.color}35`}}>{cat.emoji} {cat.label}</span>:null;})()}

            {/* Handoff + input */}
            <div style={{borderTop:'1px solid var(--border)',padding:'12px 20px',flexShrink:0}}>
              {fbkHandoff&&(
                <div className="oc-handoff-active-bar visible" style={{marginBottom:10}}>

                <select value={sel.status} onChange={e=>mudarStatus(sel.id,e.target.value)}
                  style={{fontSize:12,padding:'5px 10px',borderRadius:8,background:STA_FBK[sel.status]?.bg||'transparent',border:`1px solid ${STA_FBK[sel.status]?.border||'var(--border)'}`,color:STA_FBK[sel.status]?.color||'var(--text)'}}>
                  {Object.entries(STA_FBK).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                </select>
              </div>
              {fbkHandoff&&(
                <div style={{display:'flex',gap:8}}>
                  <textarea value={fbkMsg} onChange={e=>setFbkMsg(e.target.value)}

                    onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendFbkMsg();}}}
                    style={{flex:1,fontSize:13,lineHeight:1.5,background:'rgba(0,0,0,.3)',border:'1px solid var(--border)',borderRadius:6,padding:'10px 12px',color:'var(--text)',resize:'none',minHeight:44}}/>
                  <button className="btn btn-primary" style={{alignSelf:'flex-end',padding:'10px 16px'}}
                    onClick={sendFbkMsg} disabled={fbkSending||!fbkMsg.trim()}>
                    {fbkSending?'...':'Enviar'}
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── RELATÓRIOS — PAINEL GOVERNO ─────────────────────────────── */
function Relatorios(){
  const [periodo,setPeriodo]=useState('tudo');
  const [dados,setDados]=useState(REL_DATA||REL_DEMO);
  const [loading,setLoading]=useState(false);

  /* busca dados filtrados por periodo */
  useEffect(()=>{
    let cancel=false;
    async function load(){
      setLoading(true);
      try{
        const r=await fetch(API_URL+'/api/relatorio?periodo='+periodo);
        if(r.ok&&!cancel){setDados(await r.json());}
      }catch(e){if(!cancel&&!dados)setDados(REL_DEMO);}
      if(!cancel)setLoading(false);
    }
    if(periodo==='tudo'&&REL_DATA){setDados(REL_DATA);}
    else load();
    return()=>{cancel=true;};
  },[periodo]);

  /* sync com polling global */
  const prevRef=useRef(REL_DATA);
  useEffect(()=>{
    if(periodo==='tudo'&&REL_DATA&&REL_DATA!==prevRef.current){prevRef.current=REL_DATA;setDados(REL_DATA);}
  });

  const d=dados||REL_DATA||REL_DEMO;
  if(!d)return(<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'var(--text-muted)',fontSize:14}}>Carregando relatório...</div>);

  /* helpers */
  const pct=(v,t)=>t>0?Math.round((v/t)*100):0;
  const totalGeral=(d.denuncias?.total||0)+(d.ocorrencias?.total||0)+(d.feedbacks?.total||0)+(d.sos?.total||0);
  const totalPago=d.recompensas?.valor_pago||0;
  const totalFinanceiro=totalPago+(d.recompensas?.valor_aguardando||0)+(d.recompensas?.valor_pendente||0);

  /* labels e cores — SEM EMOJIS, apenas dot colorido */
  const catDen={pichacao:{l:'Pichação',c:'#818cf8'},trafico_drogas:{l:'Tráfico de Drogas',c:'#f87171'},descarte_irregular:{l:'Descarte Irregular',c:'#fbbf24'},furto_fios:{l:'Furto de Fios',c:'#60a5fa'},depredacao:{l:'Depredação',c:'#fb923c'},generica:{l:'Outros',c:'#6b7280'}};
  const catOc={iluminacao:{l:'Iluminação',c:'#fbbf24'},buraco_via:{l:'Buraco na Via',c:'#60a5fa'},alagamento:{l:'Alagamento',c:'#22d3ee'},arvore_caida:{l:'Árvore Caída',c:'#4ade80'},vazamento_agua:{l:'Vazamento',c:'#38bdf8'},poluicao_sonora:{l:'Poluição Sonora',c:'#a78bfa'},abandono_veiculo:{l:'Veículo Abandonado',c:'#fb923c'},descarte_irregular:{l:'Descarte',c:'#f87171'},animal_solto:{l:'Animal Solto',c:'#e879f9'},mau_cheiro:{l:'Mau Cheiro',c:'#84cc16'},outros:{l:'Outros',c:'#6b7280'}};
  const sevMap={baixa:{l:'Baixa',c:'#4ade80'},media:{l:'Média',c:'#fbbf24'},alta:{l:'Alta',c:'#fb923c'},critica:{l:'Crítica',c:'#ef4444'}};
  const statusDen={nova:{l:'Nova',c:'#60a5fa'},em_analise:{l:'Em Análise',c:'#fbbf24'},procedente:{l:'Procedente',c:'#4ade80'},improcedente:{l:'Improcedente',c:'#f87171'},encaminhada:{l:'Encaminhada',c:'#a78bfa'},resolvida:{l:'Resolvida',c:'#059669'}};
  const statusOc={aberta:{l:'Aberta',c:'#60a5fa'},em_atendimento:{l:'Em Atendimento',c:'#fbbf24'},resolvido:{l:'Resolvido',c:'#4ade80'},encaminhada:{l:'Encaminhada',c:'#a78bfa'}};
  const sentMap={positivo:{l:'Positivo',c:'#4ade80'},negativo:{l:'Negativo',c:'#ef4444'},neutro:{l:'Neutro',c:'#94a3b8'},misto:{l:'Misto',c:'#a78bfa'}};
  const recMap={pendente_validacao:{l:'Pendente Validação',c:'#fbbf24'},validada:{l:'Validada',c:'#60a5fa'},aguardando_pagamento:{l:'Aguardando Pgto',c:'#a78bfa'},paga:{l:'Paga',c:'#4ade80'},rejeitada:{l:'Rejeitada',c:'#ef4444'}};

  /* dados processados */
  const denCatData=Object.entries(d.denuncias?.por_categoria||{}).sort((a,b)=>b[1]-a[1]);
