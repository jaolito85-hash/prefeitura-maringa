*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e0d;
  --surface:#111614;
  --card:#141917;
  --card-hover:#1a1f1d;
  --border:#1e2624;
  --border-light:#2a3330;
  --accent:#1DB954;
  --accent-light:#22d35e;
  --accent-bg:rgba(29,185,84,.06);
  --blue:#00D1FF;
  --cyan:#00D1FF;
  --text:#e8ebe9;
  --text-secondary:#a1a8a5;
  --text-muted:#5f6b66;
  --danger:#dc2626;
  --danger-light:#ef4444;
  --warn:#fbbf24;
  --warn-light:#fbbf24;
  --success:#1DB954;
  --success-light:#22d35e;
  --purple:#7c3aed;
  --radius:14px;
}
html,body,#root{height:100%;background:var(--bg);color:var(--text);overflow:hidden}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:15px;font-weight:400;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
::-webkit-scrollbar{width:7px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2a3330;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#3a4540}
.app{display:flex;flex-direction:column;height:100vh}

/* ─── HEADER ─────────────────────────────────────────────────── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:72px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;position:relative;z-index:20}
.logo{display:flex;align-items:center;gap:14px}
.logo-mark{width:38px;height:38px}
.logo-text{font-size:21px;font-weight:800;color:#fff;letter-spacing:-.3px}
.logo-text span{font-weight:500;color:var(--accent-light);margin-left:2px}
.logo-sep{width:1px;height:28px;background:var(--border-light);margin:0 20px}
.logo-sub{font-size:14px;color:var(--text-secondary);font-weight:500;letter-spacing:-.01em}
.hdr-right{display:flex;align-items:center;gap:24px}
.status-badge{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--success-light);padding:6px 16px;background:rgba(29,185,84,.08);border:1px solid rgba(29,185,84,.2);border-radius:24px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--success-light);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.clock-area{text-align:right}
.clock{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:700;color:#fff;letter-spacing:.5px}
.clock-date{font-size:13px;color:var(--text-muted);margin-top:2px;text-transform:capitalize;font-weight:500}
.hdr-btn{background:var(--card);border:1px solid var(--border);color:var(--text-secondary);width:42px;height:42px;border-radius:10px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s}

.sos-banner:hover{background:#b91c1c}
.sos-label{font-weight:800;font-size:14px;letter-spacing:.8px;text-transform:uppercase}
.sos-detail{font-size:14px;opacity:.9;margin-left:8px;font-weight:500}

/* ─── BODY ───────────────────────────────────────────────────── */

/* ─── SIDEBAR ────────────────────────────────────────────────── */
.sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 14px;flex-shrink:0}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius)}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;padding:24px;flex-shrink:0}

.b-green{background:rgba(29,185,84,.1);color:#4ade80;border:1px solid rgba(29,185,84,.2)}
.b-purple{background:rgba(124,58,237,.1);color:#a78bfa;border:1px solid rgba(124,58,237,.2)}

@keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}

.anim-dot{animation:scaleIn .3s ease-out both}

/* ─── ANIMATED NUMBER (counts from 0 to target) ────────────── */
function AnimatedNumber({value,duration=1200,prefix='',suffix='',style={},className=''}){
  const [display,setDisplay]=useState(0);
  const numVal=typeof value==='string'?parseFloat(value.replace(/[^\d.-]/g,''))||0:value;
  const isNum=!isNaN(numVal)&&isFinite(numVal);
  useEffect(()=>{
    if(!isNum){setDisplay(value);return;}
    let start=null;const from=0;const to=numVal;
    function step(ts){
      if(!start)start=ts;
      const p=Math.min((ts-start)/duration,1);
      const ease=1-Math.pow(1-p,3);
      setDisplay(Math.round(from+(to-from)*ease));
      if(p<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  },[numVal]);
  if(!isNum)return <span className={className} style={style}>{prefix}{value}{suffix}</span>;
  return <span className={className} style={style}>{prefix}{display.toLocaleString('pt-BR')}{suffix}</span>;
}

/* ─── PAGE TRANSITION WRAPPER ──────────────────────────────── */
function PageTransition({children,pageKey}){
  const [show,setShow]=useState(false);
  useEffect(()=>{setShow(false);requestAnimationFrame(()=>setShow(true));},[pageKey]);
  return <div style={{opacity:show?1:0,transform:show?'translateY(0)':'translateY(8px)',transition:'opacity .35s ease, transform .35s ease',height:'100%'}}>{children}</div>;
}

function nearestBase(lat,lng,tipo){
  const filtered=tipo?BASES.filter(b=>b.tipo===tipo):BASES;
  let best=null,bestDist=Infinity;
  filtered.forEach(b=>{
    const d=Math.sqrt(Math.pow(b.lat-lat,2)+Math.pow(b.lng-lng,2));
    if(d<bestDist){bestDist=d;best=b;}
  });
  return best;
}

/* ─── MAPBOX DIRECTIONS API ───────────────────────────────────── */
async function fetchRoute(fromLng,fromLat,toLng,toLat){
  const url=`https://api.mapbox.com/directions/v5/mapbox/driving/${fromLng},${fromLat};${toLng},${toLat}?geometries=geojson&overview=full&access_token=${MAPBOX_TOKEN}`;
  try{
    const res=await fetch(url);
    const data=await res.json();
    if(data.routes&&data.routes.length>0){
      const route=data.routes[0];
      return{
        geometry:route.geometry,
        duration:route.duration,
        distance:route.distance,
      };
    }
    return null;
  }catch(e){console.error('Route fetch error:',e);return null;}
}

/* ─── MAPBOX (100% NATIVE LAYERS — circle + pulse) ───────────── */
function MapboxMap({items=[],fullscreen=false,style={},showBases=false,route=null}){
  const mapRef=useRef(null);
  const containerRef=useRef(null);
  const popupRef=useRef(null);
  const readyRef=useRef(false);
  const pulseRef=useRef(null);

  const sevStops=['critica','#dc2626','alta','#ef4444','media','#d97706','baixa','#1DB954'];

  function itemsToGeoJSON(list){
    return{type:'FeatureCollection',features:list.filter(i=>i.lat&&i.lng).map((item,idx)=>{
      const sev=SEV[item.severidade]||SEV.baixa;
      return{type:'Feature',geometry:{type:'Point',coordinates:[item.lng,item.lat]},properties:{
        id:item.id||idx,titulo:item.titulo||item.mensagem||'Alerta SOS',bairro:item.bairro||'—',
        sevLabel:sev.label,sevColor:sev.c,dotColor:sev.dot,
        severidade:item.severidade||'baixa',
        tipo:item.tipo||item.categoria||'ocorrencia',
      }};
    })};
  }
  function basesToGeoJSON(){
    return{type:'FeatureCollection',features:BASES.map(b=>({type:'Feature',geometry:{type:'Point',coordinates:[b.lng,b.lat]},properties:{
      id:b.id,nome:b.nome,endereco:b.endereco,telefone:b.telefone,cor:b.cor,tipo:b.tipo,
    }}))};
  }

  useEffect(()=>{
    if(!containerRef.current||mapRef.current) return;
    mapboxgl.accessToken=MAPBOX_TOKEN;
    const map=new mapboxgl.Map({
      container:containerRef.current,
      style:'mapbox://styles/mapbox/dark-v11',
      center:[-51.9375,-23.4205],
      zoom:13,pitch:45,bearing:-10,antialias:true,
    });
    map.addControl(new mapboxgl.NavigationControl({showCompass:true,visualizePitch:true}),'top-right');
    popupRef.current=new mapboxgl.Popup({closeButton:false,closeOnClick:true,maxWidth:'280px',offset:14});

    map.on('load',()=>{
      // Terrain + 3D
      map.addSource('mapbox-dem',{type:'raster-dem',url:'mapbox://mapbox.mapbox-terrain-dem-v1',tileSize:512});
      map.setTerrain({source:'mapbox-dem',exaggeration:1.5});
      map.addLayer({id:'3d-buildings',source:'composite','source-layer':'building',filter:['==','extrude','true'],type:'fill-extrusion',minzoom:13,paint:{'fill-extrusion-color':'#0d1210','fill-extrusion-height':['get','height'],'fill-extrusion-base':['get','min_height'],'fill-extrusion-opacity':.5}});

      // ── Route ──
      map.addSource('route',{type:'geojson',data:{type:'Feature',geometry:{type:'LineString',coordinates:[]}}});
      map.addLayer({id:'route-line-shadow',type:'line',source:'route',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':'#000','line-width':8,'line-opacity':0.3,'line-blur':4}});
      map.addLayer({id:'route-line',type:'line',source:'route',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':'#00D1FF','line-width':4,'line-opacity':0.9}});
      map.addLayer({id:'route-line-glow',type:'line',source:'route',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':'#00D1FF','line-width':10,'line-opacity':0.15,'line-blur':6}});

      // ── Incidents source ──
      map.addSource('incidents',{type:'geojson',data:{type:'FeatureCollection',features:[]}});

      // Pulse ring 1 — onda externa (animada via JS)
      map.addLayer({id:'inc-pulse1',type:'circle',source:'incidents',paint:{
        'circle-radius':16,
        'circle-color':['match',['get','severidade'],...sevStops,'#6b7280'],
        'circle-opacity':0.25,
        'circle-stroke-width':1.5,
        'circle-stroke-color':['match',['get','severidade'],...sevStops,'#6b7280'],
        'circle-stroke-opacity':0.3,
      }});
      // Pulse ring 2 — onda interna (fase invertida)
      map.addLayer({id:'inc-pulse2',type:'circle',source:'incidents',paint:{
        'circle-radius':12,
        'circle-color':['match',['get','severidade'],...sevStops,'#6b7280'],
        'circle-opacity':0.18,
        'circle-stroke-width':0,
      }});

      // Halo estático suave
      map.addLayer({id:'inc-glow',type:'circle',source:'incidents',paint:{
        'circle-radius':15,
        'circle-color':['match',['get','severidade'],...sevStops,'#6b7280'],
        'circle-opacity':0.1,
        'circle-blur':1,
      }});

      // Círculo principal do incidente (sólido + borda branca)
      map.addLayer({id:'inc-main',type:'circle',source:'incidents',paint:{
        'circle-radius':9,
        'circle-color':['match',['get','severidade'],...sevStops,'#6b7280'],
        'circle-opacity':0.95,
        'circle-stroke-width':2.5,
        'circle-stroke-color':'rgba(255,255,255,0.6)',
      }});

      // Ponto central branco
      map.addLayer({id:'inc-dot',type:'circle',source:'incidents',paint:{
        'circle-radius':3,
        'circle-color':'#ffffff',
        'circle-opacity':0.9,
      }});

      // ── Bases source ──
      map.addSource('bases',{type:'geojson',data:{type:'FeatureCollection',features:[]}});

      // Base: halo pulsante
      map.addLayer({id:'base-pulse',type:'circle',source:'bases',paint:{
        'circle-radius':16,
        'circle-color':['get','cor'],
        'circle-opacity':0.1,
        'circle-stroke-width':1,
        'circle-stroke-color':['get','cor'],
        'circle-stroke-opacity':0.15,
      }});
      // Base: círculo principal (fundo escuro + borda colorida)
      map.addLayer({id:'base-main',type:'circle',source:'bases',paint:{
        'circle-radius':10,
        'circle-color':'#141917',
        'circle-opacity':0.95,
        'circle-stroke-width':2.5,
        'circle-stroke-color':['get','cor'],
      }});
      // Base: ponto central colorido
      map.addLayer({id:'base-dot',type:'circle',source:'bases',paint:{
        'circle-radius':4,
        'circle-color':['get','cor'],
        'circle-opacity':0.9,
      }});

      // ══════ Animação Pulse (Dupla Onda + triggerRepaint) ══════
      let t=0;
      function animatePulse(){
        t+=0.025;
        const p1=(Math.sin(t*2.5)+1)/2;
        const r1=12+p1*5;
        const o1=0.15-p1*0.11;
        const s1=0.12-p1*0.09;
        const p2=(Math.sin(t*2.5+Math.PI)+1)/2;
        const r2=11+p2*3;
        const o2=0.1-p2*0.06;
        const bp=(Math.sin(t*1.8)+1)/2;
        const br=13+bp*3;
        const bo=0.06-bp*0.03;
        try{
          map.setPaintProperty('inc-pulse1','circle-radius',r1);
          map.setPaintProperty('inc-pulse1','circle-opacity',Math.max(0.02,o1));
          map.setPaintProperty('inc-pulse1','circle-stroke-opacity',Math.max(0.02,s1));
          map.setPaintProperty('inc-pulse2','circle-radius',r2);
          map.setPaintProperty('inc-pulse2','circle-opacity',Math.max(0.02,o2));
          map.setPaintProperty('base-pulse','circle-radius',br);
          map.setPaintProperty('base-pulse','circle-opacity',Math.max(0.02,bo));
        }catch(e){}
        map.triggerRepaint();
        pulseRef.current=requestAnimationFrame(animatePulse);
      }
      animatePulse();

      // ── Popups ──
      map.on('click','inc-main',(e)=>{
        const f=e.features[0];const coords=f.geometry.coordinates.slice();const p=f.properties;
        popupRef.current.setLngLat(coords).setHTML(
          `<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:#f5f5f5;font-family:Inter,system-ui;min-width:200px;box-shadow:0 8px 24px rgba(0,0,0,.5)">
            <div style="font-weight:600;font-size:13px;margin-bottom:4px;line-height:1.3">${p.titulo}</div>
            <div style="font-size:12px;color:#9ca3af">${p.bairro}</div>
            <div style="margin-top:8px;display:flex;gap:6px;align-items:center">
              <span style="width:8px;height:8px;border-radius:50%;background:${p.dotColor};box-shadow:0 0 6px ${p.dotColor}"></span>
              <span style="font-size:11px;color:${p.sevColor};font-weight:500">${p.sevLabel}</span>
            </div>
          </div>`
        ).addTo(map);
      });
      map.on('click','base-main',(e)=>{
        const f=e.features[0];const coords=f.geometry.coordinates.slice();const p=f.properties;
        popupRef.current.setLngLat(coords).setHTML(
          `<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:#f5f5f5;font-family:Inter,system-ui;box-shadow:0 8px 24px rgba(0,0,0,.5)">
            <div style="font-weight:600;font-size:13px;margin-bottom:2px">${p.nome}</div>
            <div style="font-size:11px;color:#9ca3af">${p.endereco}</div>
            <div style="font-size:12px;color:${p.cor};margin-top:6px;font-weight:500">${p.telefone}</div>
          </div>`
        ).addTo(map);
      });
      ['inc-main','base-main'].forEach(layer=>{
        map.on('mouseenter',layer,()=>{map.getCanvas().style.cursor='pointer';});
        map.on('mouseleave',layer,()=>{map.getCanvas().style.cursor='';});
      });

      readyRef.current=true;
    });
    mapRef.current=map;
    return()=>{
      if(pulseRef.current) cancelAnimationFrame(pulseRef.current);
      map.remove();mapRef.current=null;readyRef.current=false;
    };
  },[]);

  // Update route
  useEffect(()=>{
    const map=mapRef.current;if(!map) return;
    const apply=()=>{
      const src=map.getSource('route');if(!src) return;
      if(route&&route.geometry){
        src.setData({type:'Feature',geometry:route.geometry});
        const coords=route.geometry.coordinates;
        if(coords.length>1){
          const bounds=coords.reduce((b,c)=>b.extend(c),new mapboxgl.LngLatBounds(coords[0],coords[0]));
          map.fitBounds(bounds,{padding:{top:80,bottom:200,left:80,right:80},duration:1200});
        }
      }else{src.setData({type:'Feature',geometry:{type:'LineString',coordinates:[]}});}
    };
    if(readyRef.current){apply();}else{map.once('load',apply);}
  },[route]);

  // Update incident points
  useEffect(()=>{
    const map=mapRef.current;if(!map) return;
    const apply=()=>{const src=map.getSource('incidents');if(src) src.setData(itemsToGeoJSON(items));};
    if(readyRef.current){apply();}else{map.once('load',apply);}
  },[items]);

  // Update base points
  useEffect(()=>{
    const map=mapRef.current;if(!map) return;
    const apply=()=>{
      const src=map.getSource('bases');if(!src) return;
      src.setData(showBases?basesToGeoJSON():{type:'FeatureCollection',features:[]});
    };
    if(readyRef.current){apply();}else{map.once('load',apply);}
  },[showBases]);

  // Resize
  useEffect(()=>{if(mapRef.current) setTimeout(()=>mapRef.current.resize(),150);});

  return <div ref={containerRef} className={`map-container${fullscreen?' fullscreen':''}`} style={style}/>;
}

/* ─── ROUTE PANEL ─────────────────────────────────────────────── */
function RoutePanel({route,base,incident,onClose}){
  if(!route||!base||!incident) return null;
  const durMin=Math.ceil(route.duration/60);
  const distKm=(route.distance/1000).toFixed(1);
  const gmapLink=googleMapsLink(base.lat,base.lng,incident.lat,incident.lng);
  const wazeLink=`https://waze.com/ul?ll=${incident.lat},${incident.lng}&navigate=yes`;
  const msgText=encodeURIComponent(`🚨 DESPACHO URGENTE\n📍 ${incident.titulo||incident.mensagem||'Alerta SOS'}\n🏘️ ${incident.bairro||'—'}\n⏱️ ETA: ${durMin}min (${distKm}km)\n🗺️ Rota: ${gmapLink}`);
  return(
    <div className="route-panel">
      <button className="route-panel-close" onClick={onClose}>✕</button>
      <div className="route-info">
        <h3>{base.icon} {base.nome} → {incident.titulo||incident.mensagem||'Alerta'}</h3>
        <p>{base.endereco} → {incident.bairro||'—'}</p>
        <div className="route-stats">
          <div className="route-stat"><div className="val" style={{color:'#00D1FF'}}>{durMin}<span style={{fontSize:12,fontWeight:400}}>min</span></div><div className="lbl">Tempo Est.</div></div>
          <div className="route-stat"><div className="val">{distKm}<span style={{fontSize:12,fontWeight:400}}>km</span></div><div className="lbl">Distância</div></div>
          <div className="route-stat"><div className="val" style={{color:SEV[incident.severidade]?.c||'#fbbf24'}}>{SEV[incident.severidade]?.label||'—'}</div><div className="lbl">Severidade</div></div>
        </div>
      </div>
      <div className="route-actions">
        <a href={gmapLink} target="_blank" rel="noopener" className="route-dispatch primary" style={{textDecoration:'none'}}><span className="emoji">🗺️</span> Abrir Google Maps</a>
        <a href={wazeLink} target="_blank" rel="noopener" className="route-dispatch" style={{textDecoration:'none'}}><span className="emoji">🧭</span> Abrir Waze</a>
        <a href={`https://wa.me/?text=${msgText}`} target="_blank" rel="noopener" className="route-dispatch" style={{textDecoration:'none'}}><span className="emoji">📲</span> Enviar WhatsApp</a>
        <button className="route-dispatch" onClick={()=>{navigator.clipboard.writeText(decodeURIComponent(msgText));}}><span className="emoji">📋</span> Copiar Despacho</button>
      </div>
    </div>
  );
}

/* ─── CHARTS (ANIMATED) ────────────────────────────────────── */
function BarChart({data,keys,colors,height=220}){
  const max=Math.max(...data.flatMap(d=>keys.map(k=>d[k]||0)))*1.1||1;
  const W=500,H=height,PAD={l:50,r:15,t:10,b:36};
  const cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
  const gw=cW/data.length;
  const bw=Math.min(24,gw*0.28);
  const total=keys.length*(bw+3)-3;
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto'}}>
      {[0,.25,.5,.75,1].map(p=>{
        const y=PAD.t+cH*(1-p);
        return(<g key={p}><line x1={PAD.l} y1={y} x2={W-PAD.r} y2={y} stroke="#2a2a2a" strokeWidth="1"/><text x={PAD.l-8} y={y+4} textAnchor="end" fontSize="10" fill="#6b7280" fontFamily="IBM Plex Mono">{Math.round(max*p)}</text></g>);
      })}
      {data.map((d,di)=>{
        const cx=PAD.l+di*gw+gw/2;
        return(<g key={di}>
          {keys.map((k,ki)=>{
            const val=d[k]||0;const bh=max>0?(cH*(val/max)):0;
            const x=cx-total/2+ki*(bw+3);const y=PAD.t+cH-bh;
            const delay=di*0.08+ki*0.04;
            return(<g key={k}>
              <rect x={x} y={y} width={bw} height={bh} fill={colors[ki]} rx="3" opacity=".85"
                className="anim-bar" style={{animationDelay:`${delay}s`}}/>
              {val>0&&<text x={x+bw/2} y={y-4} textAnchor="middle" fontSize="10" fill="#9ca3af" fontFamily="IBM Plex Mono"
                className="anim-fade" style={{animationDelay:`${delay+0.4}s`}}>{val}</text>}
            </g>);
          })}
          <text x={cx} y={H-PAD.b+18} textAnchor="middle" fontSize="11" fill="#6b7280" fontFamily="Inter">{d.label}</text>
        </g>);
      })}
    </svg>
  );
}

function AreaChart({data,keys,colors,height=220}){
  const max=Math.max(...data.flatMap(d=>keys.map(k=>d[k]||0)))*1.15||1;
  const W=500,H=height,PAD={l:50,r:15,t:10,b:36};
  const cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
  const pts=(k)=>data.map((d,i)=>[PAD.l+i*cW/(data.length-1),PAD.t+cH*(1-(d[k]||0)/max)]);
  const toP=(pts)=>pts.map((p,i)=>`${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const toA=(arr)=>{const l=arr[arr.length-1],f=arr[0];return toP(arr)+` L${l[0].toFixed(1)},${PAD.t+cH} L${f[0].toFixed(1)},${PAD.t+cH} Z`;};
  const lineRef=useRef([]);
  const [ready,setReady]=useState(false);
  useEffect(()=>{setTimeout(()=>setReady(true),50);},[]);
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto'}}>
      <defs>{keys.map((k,ki)=><linearGradient key={k} id={`ag${ki}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={colors[ki]} stopOpacity=".2"/><stop offset="100%" stopColor={colors[ki]} stopOpacity=".01"/></linearGradient>)}</defs>
      {[0,.25,.5,.75,1].map(p=>{
        const y=PAD.t+cH*(1-p);
        return(<g key={p}><line x1={PAD.l} y1={y} x2={W-PAD.r} y2={y} stroke="#2a2a2a" strokeWidth="1"/><text x={PAD.l-8} y={y+4} textAnchor="end" fontSize="10" fill="#6b7280" fontFamily="IBM Plex Mono">{Math.round(max*p)}</text></g>);
      })}
      {keys.map((k,ki)=>{
        const p=pts(k);
        const pathD=toP(p);
        return(<g key={k}>
          <path d={toA(p)} fill={`url(#ag${ki})`} className="anim-fade" style={{animationDelay:`${ki*0.2+0.6}s`}}/>
          <path ref={el=>{if(el&&!lineRef.current[ki]){const len=el.getTotalLength();el.style.strokeDasharray=len;el.style.strokeDashoffset=len;el.style.setProperty('--dash-len',len);lineRef.current[ki]=true;}}}
            d={pathD} fill="none" stroke={colors[ki]} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
            className={ready?'anim-line':''} style={{animationDelay:`${ki*0.2}s`}}/>
          {p.map((pt,i)=><circle key={i} cx={pt[0]} cy={pt[1]} r="4" fill="#121212" stroke={colors[ki]} strokeWidth="2.5"
            className="anim-dot" style={{animationDelay:`${0.15*i+ki*0.2+0.3}s`}}/>)}
        </g>);
      })}
      {data.map((d,i)=>{const x=PAD.l+i*cW/(data.length-1);return <text key={i} x={x} y={H-PAD.b+18} textAnchor="middle" fontSize="11" fill="#6b7280" fontFamily="Inter">{d.label}</text>;})}
    </svg>
  );
}

function DonutChart({data,size=160}){
  const total=data.reduce((a,d)=>a+d.v,0);
  const cx=50,cy=50,r=34,strokeW=10;
  const circ=2*Math.PI*r;
  let cumOffset=0;
  const segments=data.map((d,i)=>{
    const pct=d.v/total;
    const dashLen=circ*pct;
    const gap=circ-dashLen;
    const offset=cumOffset;
    cumOffset+=dashLen;
    return{...d,dashLen,gap,offset,delay:i*0.15};
  });
  return(<svg viewBox="0 0 100 100" style={{width:size,height:size,flexShrink:0}}>
    <circle cx={cx} cy={cy} r={r} fill="none" stroke="#2a2a2a" strokeWidth={strokeW}/>
    {segments.map((s,i)=>(
      <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.c} strokeWidth={strokeW}
        strokeDasharray={`${s.dashLen} ${s.gap}`}
        strokeDashoffset={-s.offset}
        strokeLinecap="round"
        transform={`rotate(-90 ${cx} ${cy})`}
        style={{opacity:0,animation:`fadeIn .6s ease-out ${s.delay+0.2}s both`}}/>
    ))}
    <AnimatedNumber value={total} prefix="" suffix="" duration={1000}
      className="" style={{}} />
    <text x="50" y="48" textAnchor="middle" fontSize="14" fill="#f5f5f5" fontFamily="IBM Plex Mono" fontWeight="600">{total}</text>
    <text x="50" y="58" textAnchor="middle" fontSize="6.5" fill="#6b7280" fontFamily="Inter" fontWeight="500">TOTAL</text>
  </svg>);
}

/* ─── SOS MULHER ───────────────────────────────────────────────── */
function SOSMulher(){
  const [sel,setSel]=useState(SOS[0]);
  const [routeData,setRouteData]=useState(null);
  const [routeBase,setRouteBase]=useState(null);
  const [routeIncident,setRouteIncident]=useState(null);
  const [loadingRoute,setLoadingRoute]=useState(false);

  async function handleTraceRoute(item){
    setLoadingRoute(true);
    const base=nearestBase(item.lat,item.lng,'pm');
    if(!base){setLoadingRoute(false);return;}
    const r=await fetchRoute(base.lng,base.lat,item.lng,item.lat);
    if(r){setRouteData(r);setRouteBase(base);setRouteIncident({...item,severidade:'critica',titulo:'SOS: '+item.sos_cadastros?.nome});}
    setLoadingRoute(false);
  }

  return(
    <div style={{display:'flex',height:'100%',overflow:'hidden',position:'relative'}}>
      <div style={{width:370,flexShrink:0,borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',background:'var(--surface)'}}>
        <div style={{padding:'20px 20px 12px'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
            <div style={{width:10,height:10,borderRadius:'50%',background:'#dc2626',animation:'pulse 1s infinite'}}/>
            <span style={{fontSize:13,fontWeight:800,color:'#dc2626',textTransform:'uppercase',letterSpacing:'1.2px'}}>Alertas Ativos</span>
            <span className="nav-badge" style={{marginLeft:'auto'}}>{SOS.length}</span>
          </div>
        </div>
        {SOS.map(s=>(
          <div key={s.id} onClick={()=>setSel(s)} style={{margin:'0 12px 8px',padding:'18px 20px',borderRadius:12,background:sel?.id===s.id?'rgba(220,38,38,.07)':'rgba(220,38,38,.03)',border:`1px solid ${sel?.id===s.id?'rgba(220,38,38,.3)':'rgba(220,38,38,.12)'}`,cursor:'pointer',transition:'all .15s'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontWeight:700,fontSize:16,color:'#fff'}}>{s.sos_cadastros?.nome||s.telefone}</span>
              <span style={{fontSize:13,color:'#f87171',fontWeight:600}}>{ago(s.created_at)}</span>
            </div>
            <div style={{fontSize:14,color:'var(--text-secondary)',fontWeight:500}}>{s.sos_cadastros?.endereco}</div>
          </div>
        ))}
        <div style={{height:1,background:'var(--border)',margin:'18px 16px 12px'}}/>
        <div style={{padding:'0 20px 8px',fontSize:11,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'1.2px'}}>Histórico</div>
        {[{nome:'Joana Ferreira',tempo:'2 dias'}].map((h,i)=>(
          <div key={i} style={{padding:'14px 20px',borderBottom:'1px solid var(--border)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:14,color:'var(--text-secondary)',fontWeight:600}}>{h.nome}</span>
              <span className="badge b-green">Resolvido</span>
            </div>
            <div style={{fontSize:13,color:'var(--text-muted)',marginTop:4,fontWeight:500}}>há {h.tempo}</div>
          </div>
        ))}
      </div>
      {sel?(
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative'}}>
          <div style={{flex:1,padding:32,overflowY:'auto'}}>
            <div style={{maxWidth:760}}>
              <div style={{background:'rgba(220,38,38,.03)',border:'1px solid rgba(220,38,38,.15)',borderRadius:16,padding:28,marginBottom:24}}>
                <div style={{display:'flex',alignItems:'center',gap:20,marginBottom:24}}>
                  <div style={{width:60,height:60,borderRadius:16,background:'rgba(220,38,38,.08)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>🛡️</div>

                    <button className="btn btn-primary">📞 Ligar</button>
                    <button className="btn btn-danger">Resolver</button>

              <div className="card" style={{padding:22}}>

                <textarea placeholder="Adicionar nota sobre o atendimento..." style={{width:'100%',minHeight:120,fontSize:15,lineHeight:1.7}}/>
              </div>
            </div>
          </div>
          <div style={{borderRadius:14,overflow:'hidden',height:300,marginBottom:20,position:'absolute',bottom:0,left:0,right:0}}>
            <MapboxMap items={[{...sel,severidade:'critica',titulo:'SOS: '+sel.sos_cadastros?.nome}]} showBases={true} route={routeData}/>
            {routeData&&<RoutePanel route={routeData} base={routeBase} incident={routeIncident} onClose={()=>{setRouteData(null);setRouteBase(null);setRouteIncident(null);}}/>}

        </div>
      ):(
        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>

/* ─── FEEDBACKS ────────────────────────────────────────────────── */
function Feedbacks(){
  const [sel,setSel]=useState(null);
  const [msgs,setMsgs]=useState([]);
  const [filtCat,setFiltCat]=useState('');
  const [filtPri,setFiltPri]=useState('');
  const [filtSta,setFiltSta]=useState('ativos');

  const lista=FBK.filter(f=>{
    if(filtCat&&f.categoria!==filtCat)return false;
    if(filtPri&&f.prioridade!==filtPri)return false;
    if(filtSta==='ativos')return['aberto','em_atendimento','encaminhado'].includes(f.status);
    if(filtSta==='resolvido')return f.status==='resolvido';
    return true;
  });
  const criticos=lista.filter(f=>f.prioridade==='critico').length;
  const urgentes=lista.filter(f=>f.prioridade==='urgente').length;

  function selecionar(f){
    if(sel?.id===f.id){setSel(null);setMsgs([]);return;}
    setSel(f);setMsgs(FBK_MSGS[f.id]||[]);
  }
  function mudarStatus(id,novo){
    /* In a real app this would call the API */
    if(sel?.id===id)setSel(prev=>({...prev,status:novo}));
  }

  return(
    <div style={{display:'flex',height:'100%',overflow:'hidden'}}>
      {/* ── Sidebar filtros ── */}

              <option value="todos">Todos</option>

            <select value={filtCat} onChange={e=>setFiltCat(e.target.value)} style={{width:'100%'}}>
              <option value="">Todas Categorias</option>
              {Object.entries(CAT_FBK).map(([k,v])=><option key={k} value={k}>{v.emoji} {v.label}</option>)}
            </select>
            <select value={filtPri} onChange={e=>setFiltPri(e.target.value)} style={{width:'100%'}}>
              <option value="">Todas Prioridades</option>
              {Object.entries(PRI_FBK).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--text-muted)',marginBottom:2}}>Resumo</div>
          <div style={{background:'rgba(255,255,255,.02)',border:'1px solid var(--border)',borderRadius:14,padding:16}}>

          </div>
          {criticos>0&&(
            <div style={{background:'rgba(220,38,38,.05)',border:'1px solid rgba(220,38,38,.18)',borderRadius:14,padding:16}}>
              <div className="mono" style={{fontSize:32,fontWeight:700,color:'#f87171',animation:'pulse 2s infinite'}}>{criticos}</div>
              <div style={{fontSize:12,color:'#f87171',fontWeight:600}}>críticos</div>

          </div>
        ):(
          <div className="scrollable" style={{flex:1,padding:20}}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(400px,1fr))',gap:18}}>
              {lista.map((f,i)=>{
                const cat=CAT_FBK[f.categoria]||{label:f.categoria||'N/A',emoji:'📌',color:'#6b7280'};
                const pri=PRI_FBK[f.prioridade]||PRI_FBK.normal;
                const sta=STA_FBK[f.status]||STA_FBK.aberto;
                const isCritico=f.prioridade==='critico';

                return(
                  <div key={f.id} className="anim-card" onClick={()=>selecionar(f)}
                    style={{background:'var(--card)',border:'1px solid var(--border)',borderLeft:`4px solid ${cat.color}`,borderRadius:'var(--radius)',cursor:'pointer',overflow:'hidden',transition:'all .2s',
                      boxShadow:isCritico?`0 0 16px rgba(220,38,38,.12)`:'none'}}>
                    {/* Topo */}
                    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',padding:'20px 20px 10px',gap:10}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                        <span style={{display:'inline-flex',alignItems:'center',gap:6,fontSize:12,fontWeight:700,padding:'5px 12px',borderRadius:10,background:`${cat.color}15`,color:cat.color,border:`1px solid ${cat.color}30`,textTransform:'uppercase',letterSpacing:'.6px'}}>
                          {cat.emoji} {cat.label}
                        </span>
                        <span style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:12,fontWeight:800,padding:'5px 12px',borderRadius:10,background:pri.color,color:'#fff',animation:pri.pulse?'pulse 2s infinite':'none'}}>
                          ● {pri.label}
                        </span>
                      </div>
                      <span style={{fontSize:12,color:'var(--text-muted)',whiteSpace:'nowrap',flexShrink:0,marginTop:3,fontWeight:500}}>{ago(f.created_at)}</span>
                    </div>

                    {/* Endereço */}
                    <div style={{padding:'0 20px 6px'}}>
                      {(f.endereco||f.bairro)?(
                        <span style={{fontSize:13,color:'var(--text-muted)',display:'flex',alignItems:'center',gap:5,fontWeight:500}}>📍 {f.endereco||f.bairro}</span>
                      ):(
                        <span style={{fontSize:12,color:'var(--text-muted)',fontStyle:'italic'}}>Sem endereço</span>
                      )}
                    </div>

                    {/* Mensagem */}
                    <div style={{padding:'12px 20px'}}>
                      <p style={{fontSize:15,lineHeight:1.65,color:'var(--text-secondary)',fontWeight:500,display:'-webkit-box',WebkitLineClamp:3,WebkitBoxOrient:'vertical',overflow:'hidden'}}>
                        "{f.mensagem}"
                      </p>
                    </div>

                    {/* Rodapé */}
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 20px',borderTop:'1px solid var(--border)',gap:10}}>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <span style={{fontSize:12,fontWeight:700,padding:'5px 12px',borderRadius:10,background:sta.bg,border:`1px solid ${sta.border}`,color:sta.color}}>{sta.label}</span>
                        {f.protocolo&&<span className="mono" style={{fontSize:11,color:'var(--text-muted)',fontWeight:500}}>{f.protocolo}</span>}
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:10}} onClick={e=>e.stopPropagation()}>
                        <select value={f.status} onChange={e=>mudarStatus(f.id,e.target.value)}
                          style={{fontSize:12,padding:'5px 10px',borderRadius:10}}>
                          {Object.entries(STA_FBK).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                        </select>
                        <button className="btn" onClick={e=>{e.stopPropagation();selecionar(f);}}
                          style={{fontSize:12,fontWeight:700,padding:'6px 14px',borderRadius:10,background:'rgba(29,185,84,.08)',border:'1px solid rgba(29,185,84,.25)',color:'#4ade80',cursor:'pointer'}}>
                          Ver conversa
                        </button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* ── Grid (visível no desktop quando detalhe aberto) ── */}
      {sel&&(
        <div className="scrollable" style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          <div style={{padding:'16px 24px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0,background:'var(--surface)'}}>
            <div>
              <div style={{fontSize:18,fontWeight:800,color:'#fff',letterSpacing:'-.3px'}}>Feedbacks</div>
              <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>Mensagens dos cidadãos via WhatsApp</div>
            </div>
            <span className="mono" style={{fontSize:12,fontWeight:700,color:'var(--text-secondary)',background:'var(--card)',border:'1px solid var(--border)',borderRadius:20,padding:'3px 14px'}}>{lista.length}</span>
          </div>
          <div className="scrollable" style={{flex:1,padding:16}}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(340px,1fr))',gap:12}}>
              {lista.map(f=>{
                const cat=CAT_FBK[f.categoria]||{label:f.categoria,emoji:'📌',color:'#6b7280'};
                const pri=PRI_FBK[f.prioridade]||PRI_FBK.normal;
                const sta=STA_FBK[f.status]||STA_FBK.aberto;
                const isActive=sel?.id===f.id;
                return(
                  <div key={f.id} onClick={()=>selecionar(f)}
                    style={{background:isActive?'rgba(29,185,84,.06)':'var(--card)',border:`1px solid ${isActive?'rgba(29,185,84,.3)':'var(--border)'}`,borderLeft:`4px solid ${cat.color}`,borderRadius:12,cursor:'pointer',padding:'12px 14px',transition:'all .15s'}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
                      <span style={{fontSize:11,fontWeight:700,color:cat.color}}>{cat.emoji} {cat.label.split(' ')[0]}</span>
                      <span style={{fontSize:10,fontWeight:800,padding:'2px 6px',borderRadius:4,background:pri.color,color:'#fff'}}>{pri.label}</span>
                      <span style={{marginLeft:'auto',fontSize:10,color:'var(--text-muted)'}}>{ago(f.created_at)}</span>
                    </div>
                    <p style={{fontSize:12,color:'var(--text-secondary)',lineHeight:1.5,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>"{f.mensagem}"</p>
                    <div style={{display:'flex',alignItems:'center',gap:6,marginTop:8}}>
                      <span style={{fontSize:10,fontWeight:600,padding:'2px 8px',borderRadius:6,background:sta.bg,border:`1px solid ${sta.border}`,color:sta.color}}>{sta.label}</span>
                      <span className="mono" style={{fontSize:9,color:'var(--text-muted)'}}>{f.protocolo}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* ── Painel de detalhe: conversa WhatsApp ── */}
      {sel&&(
        <div style={{width:440,flexShrink:0,display:'flex',flexDirection:'column',background:'var(--surface)',borderLeft:'1px solid var(--border)'}}>
          {/* Header */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'20px 24px',borderBottom:'1px solid var(--border)',flexShrink:0}}>
            <div style={{flex:1,minWidth:0}}>
              {(()=>{
                const cat=CAT_FBK[sel.categoria]||{emoji:'📌',label:sel.categoria};
                const pri=PRI_FBK[sel.prioridade]||PRI_FBK.normal;
                return(
                  <div>
                    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
                      <span style={{fontSize:22}}>{cat.emoji}</span>
                      <span style={{fontSize:16,fontWeight:800,color:'#fff'}}>{cat.label}</span>
                      <span style={{fontSize:11,fontWeight:800,padding:'3px 10px',borderRadius:8,background:pri.color,color:'#fff'}}>{pri.label}</span>
                    </div>
                    <span className="mono" style={{fontSize:12,color:'var(--text-muted)',fontWeight:500}}>{sel.protocolo}</span>
                  </div>
                );
              })()}
            </div>
            <button onClick={()=>{setSel(null);setMsgs([]);}} style={{marginLeft:14,width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-muted)',cursor:'pointer',borderRadius:10,border:'none',background:'none',fontSize:18,fontFamily:'inherit'}}>✕</button>
          </div>

          {/* Info cidadão */}
          <div style={{padding:'16px 24px',borderBottom:'1px solid var(--border)',background:'rgba(255,255,255,.02)',flexShrink:0}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px 20px',fontSize:14}}>
              {sel.nome&&(
                <div><div style={{color:'var(--text-muted)',fontSize:11,fontWeight:600,letterSpacing:'.5px',marginBottom:3,textTransform:'uppercase'}}>Cidadão</div><div style={{color:'#fff',fontWeight:600}}>{sel.nome}</div></div>
              )}
              <div><div style={{color:'var(--text-muted)',fontSize:11,fontWeight:600,letterSpacing:'.5px',marginBottom:3,textTransform:'uppercase'}}>Telefone</div><div style={{color:'#fff',fontWeight:600}}>{sel.telefone||'—'}</div></div>
              {sel.endereco&&(
                <div style={{gridColumn:'span 2'}}><div style={{color:'var(--text-muted)',fontSize:11,fontWeight:600,letterSpacing:'.5px',marginBottom:3,textTransform:'uppercase'}}>Endereço</div><div style={{color:'#fff',fontWeight:600}}>{sel.endereco}</div></div>
              )}
              {sel.bairro&&(
                <div><div style={{color:'var(--text-muted)',fontSize:11,fontWeight:600,letterSpacing:'.5px',marginBottom:3,textTransform:'uppercase'}}>Bairro</div><div style={{color:'#fff',fontWeight:600}}>{sel.bairro}</div></div>
              )}
              <div>
                <div style={{color:'var(--text-muted)',fontSize:11,fontWeight:600,letterSpacing:'.5px',marginBottom:3,textTransform:'uppercase'}}>Status</div>
                <select value={sel.status} onChange={e=>mudarStatus(sel.id,e.target.value)} style={{fontSize:12,padding:'4px 8px',width:'100%'}}>
                  {Object.entries(STA_FBK).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                </select>
              </div>
            </div>
          </div>

          {/* Thread conversa */}
          <div className="scrollable" style={{flex:1,padding:20}}>
            <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--text-muted)',textAlign:'center',marginBottom:20}}>Conversa via WhatsApp</div>

            {msgs.length===0?(
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:120,gap:8}}>
                <span style={{fontSize:32,opacity:.3}}>💬</span>
                <div style={{fontSize:12,color:'var(--text-muted)'}}>Nenhuma mensagem no histórico</div>
              </div>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                {msgs.map(m=>{
                  const deCidadao=m.de==='cidadao';
                  return(
                    <div key={m.id} style={{display:'flex',justifyContent:deCidadao?'flex-start':'flex-end'}}>
                      <div style={{maxWidth:'82%',borderRadius:16,padding:'10px 16px',
                        background:deCidadao?'var(--card)':'rgba(59,130,246,.15)',
                        border:`1px solid ${deCidadao?'var(--border)':'rgba(59,130,246,.3)'}`,
                        borderTopLeftRadius:deCidadao?4:16,borderTopRightRadius:deCidadao?16:4}}>
                        {!deCidadao&&<div style={{fontSize:10,fontWeight:700,color:'#60a5fa',marginBottom:4}}>🤖 IA Prefeitura</div>}
                        <div style={{fontSize:14,color:'var(--text-secondary)',lineHeight:1.65,fontWeight:500}}>{m.mensagem}</div>
                        <div style={{fontSize:11,color:'var(--text-muted)',marginTop:6,textAlign:'right',fontWeight:500}}>{ago(m.created_at)}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Rodapé */}
          <div style={{padding:'10px 16px',borderTop:'1px solid var(--border)',flexShrink:0,textAlign:'center'}}>
            <div style={{fontSize:11,color:'var(--text-muted)'}}>Respostas automáticas via IA · WhatsApp Evolution API</div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── RELATÓRIOS ───────────────────────────────────────────────── */
function Relatorios(){
  const [periodo,setPeriodo]=useState('mes');
  const monthly=[{label:'Out',oc:34,den:12},{label:'Nov',oc:41,den:18},{label:'Dez',oc:29,den:9},{label:'Jan',oc:52,den:22},{label:'Fev',oc:38,den:15},{label:'Mar',oc:47,den:19}];
  const reward=[{label:'Jan',pago:2400,apagar:800},{label:'Fev',pago:1800,apagar:600},{label:'Mar',pago:3200,apagar:1200}];
  const pie=[{v:18,c:'#00D1FF',n:'Vias'},{v:14,c:'#1DB954',n:'Arborização'},{v:9,c:'#00D1FF',n:'Drenagem'},{v:6,c:'#fbbf24',n:'Iluminação'}];
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      <div style={{padding:'18px 24px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:14,flexShrink:0,background:'var(--surface)'}}>
        <select value={periodo} onChange={e=>setPeriodo(e.target.value)}>
          <option value="semana">Esta semana</option><option value="mes">Este mês</option><option value="trimestre">Trimestre</option><option value="ano">Este ano</option>
        </select>
        <div style={{flex:1}}/>
        <button className="btn btn-outline">🖨️ Imprimir</button>
        <button className="btn btn-outline">📄 Exportar PDF</button>
        <button className="btn btn-primary">📧 Enviar por Email</button>
      </div>
      <div className="scrollable" style={{flex:1,padding:24}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
          <div className="chart-card anim-card"><div className="chart-title">Ocorrências × Denúncias · 6 meses</div><AreaChart data={monthly} keys={['oc','den']} colors={['#00D1FF','#1DB954']} height={260}/><div className="chart-legend"><div className="chart-legend-item"><div style={{width:12,height:3,borderRadius:2,background:'#00D1FF'}}/>Ocorrências</div><div className="chart-legend-item"><div style={{width:12,height:3,borderRadius:2,background:'#1DB954'}}/>Denúncias</div></div></div>
          <div className="chart-card anim-card"><div className="chart-title">Ocorrências por Categoria</div><div style={{display:'flex',alignItems:'center',gap:32,flex:1,justifyContent:'center'}}><DonutChart data={pie} size={190}/><div style={{display:'flex',flexDirection:'column',gap:14,flex:1}}>{pie.map((d,i)=>(<div key={i}><div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:14}}><div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:10,height:10,borderRadius:4,background:d.c}}/><span style={{color:'var(--text-muted)',fontWeight:500}}>{d.n}</span></div><span className="mono" style={{fontWeight:700,color:'#fff'}}>{d.v}</span></div><div style={{height:4,borderRadius:2,background:'rgba(255,255,255,.04)'}}><div style={{height:'100%',borderRadius:2,background:d.c,width:`${(d.v/47)*100}%`,opacity:.8}}/></div></div>))}</div></div></div>
          <div className="chart-card anim-card"><div className="chart-title">Recompensas · Mês a Mês</div><BarChart data={reward} keys={['pago','apagar']} colors={['#1DB954','#fbbf24']} height={260}/><div className="chart-legend"><div className="chart-legend-item"><div style={{width:12,height:12,borderRadius:4,background:'#1DB954'}}/>Pago</div><div className="chart-legend-item"><div style={{width:12,height:12,borderRadius:4,background:'#fbbf24'}}/>A Pagar</div></div></div>
          <div className="chart-card anim-card"><div className="chart-title">SOS Mulher · Resumo</div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,flex:1,alignContent:'center'}}>{[['Total Alertas','1','#f87171'],['Resolvidos','1','#4ade80'],['Cadastros Ativos','3','#00D1FF'],['Tempo Médio','12min','#fbbf24']].map(([l,v,c])=>(<div key={l} style={{background:'rgba(255,255,255,.02)',border:'1px solid var(--border)',borderRadius:12,padding:'22px 24px'}}><div className="mono" style={{fontSize:32,fontWeight:700,color:c}}>{v}</div><div style={{fontSize:12,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'1px',marginTop:6,fontWeight:700}}>{l}</div></div>))}</div></div>
        </div>
      </div>
    </div>
  );
}

/* ─── APP ──────────────────────────────────────────────────────── */
function App(){
  const [aba,setAba]=useState('central');
  const [hora,setHora]=useState(new Date());
  const [mutado,setMutado]=useState(false);
  const sos=SOS.length;
  useEffect(()=>{const t=setInterval(()=>setHora(new Date()),1000);return()=>clearInterval(t);},[]);

  const ABAS=[
    {id:'central',icon:<Ico.grid/>,label:'Painel'},
    {id:'mapa',icon:<Ico.map/>,label:'Mapa'},
    {id:'ocorrencias',icon:<Ico.alert/>,label:'Ocorrências'},
    {id:'denuncias',icon:<Ico.eye/>,label:'Denúncias'},
    {id:'feedbacks',icon:<Ico.chat/>,label:'Feedbacks',badge:FBK.filter(f=>f.prioridade==='critico').length||null},
    {id:'sos',icon:<Ico.shield/>,label:'SOS Mulher',badge:sos>0?sos:null},
    {id:'relatorios',icon:<Ico.report/>,label:'Relatórios'},
  ];

  return(
    <div className="app">
      <header className="hdr">
        <div className="logo">
          <Logo/>
          <div className="logo-text">Node <span>Data</span></div>
          <div className="logo-sep"/>
          <span className="logo-sub">Central de Segurança Pública · Maringá‑PR</span>
        </div>
        <div className="hdr-right">
          <div className="status-badge"><div className="status-dot"/>Online</div>
          <div className="clock-area">
            <div className="clock">{hora.toLocaleTimeString('pt-BR')}</div>
            <div className="clock-date">{hora.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}</div>
          </div>
          <button className="hdr-btn" onClick={()=>setMutado(!mutado)}>{mutado?'🔇':'🔊'}</button>
        </div>
      </header>

      {sos>0&&(
        <div className="sos-banner" onClick={()=>setAba('sos')}>
          <span style={{fontSize:18}}>🚨</span>
          <div>
            <span className="sos-label">Alerta SOS Mulher Ativo</span>
            <span className="sos-detail">{SOS[0]?.sos_cadastros?.nome} — {SOS[0]?.sos_cadastros?.endereco}</span>
          </div>
          <span style={{fontSize:12,opacity:.7}}>Clique para ver</span>
          <span className="sos-count">{sos} ativo{sos>1?'s':''}</span>
        </div>
      )}

      <div className="body">
        <nav className="sidebar">
          <div className="sidebar-section">Cidade</div>
          {ABAS.map(a=>(
            <button key={a.id} className={`nav-item ${aba===a.id?'active':''}`} onClick={()=>setAba(a.id)}
              style={a.id==='sos'&&sos>0&&aba!==a.id?{background:'rgba(220,38,38,.05)',borderColor:'rgba(220,38,38,.15)',color:'#f87171'}:{}}>
              {a.icon}
              <span>{a.label}</span>
              {a.badge!=null&&<span className="nav-badge">{a.badge}</span>}
            </button>
          ))}
          <div style={{marginTop:'auto'}}>
            <div className="nav-divider"/>
            <div className="sidebar-section">WhatsApp</div>
            {['Denúncias','SOS','Ocorrências'].map(n=>(
              <div key={n} className="ws-row"><div className="ws-dot"/>{n}</div>
            ))}
          </div>
        </nav>
        <main className="content">
          <PageTransition pageKey={aba}>
            {aba==='central'&&<Central sos={sos}/>}
            {aba==='mapa'&&<Mapa/>}
            {aba==='ocorrencias'&&<Ocorrencias/>}
            {aba==='denuncias'&&<Denuncias/>}
            {aba==='feedbacks'&&<Feedbacks/>}
            {aba==='sos'&&<SOSMulher/>}
            {aba==='relatorios'&&<Relatorios/>}
          </PageTransition>
        </main>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
